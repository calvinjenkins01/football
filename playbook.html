<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Playbook">
<link rel="apple-touch-icon" href="icon.png">
<title>Playbook — Play Designer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap');

/* ============ THEME ============ */
/* Default = light whiteboard (PlayMakerX-style). Dark + classic green in Settings. */
:root{
  /* ink + surfaces */
  --chalk:#182842; --board:#eef1f6; --board-dark:#e6eaf1;
  --panel:#ffffff; --panel-dark:#f3f5f9;
  --border:#e3e8ef; --border-strong:#c8d2de;
  --muted:#5c6b80; --dim:#94a2b4;
  /* field */
  --field:#ffffff; --band:#f5f7fa;
  --fline:#e7ecf2; --fline10:#d2dbe5; --sideline:#9aa8ba;
  --yard-num:#dce3ec; --hash:#e0e6ed; --los:#2f6fed;
  /* play ink */
  --block:#24344e; --ball:#d98324; --pull:#d98324; --gold:#d98324;
  --motion:#0da766; --reverse:#d33b3b; --d:#d33b3b; --read:#e11d48;
  --def-fill:#5b6b80; --def-text:#ffffff; --def-tri:#5b6b80;
  /* brand */
  --accent:#14904a; --accent-soft:rgba(20,144,74,.1);
  --pass-blue:#2f6fed;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 6px 18px rgba(16,24,40,.07);
  --shadow-lg:0 4px 10px rgba(16,24,40,.08),0 14px 34px rgba(16,24,40,.14);
}
:root.theme-dark{
  --chalk:#eef2f8; --board:#101927; --board-dark:#0b1220;
  --panel:#18233a; --panel-dark:#121b2e;
  --border:#26324a; --border-strong:#39486a;
  --muted:#9fb0c6; --dim:#65758f;
  --field:#141f33; --band:#18243a;
  --fline:#22304a; --fline10:#31425f; --sideline:#4a5b78;
  --yard-num:#2c3b56; --hash:#26344e; --los:#5b8ef0;
  --block:#d5dfec; --ball:#e8b03d; --pull:#e8b03d; --gold:#e8b03d;
  --motion:#3ecf85; --reverse:#e05252; --d:#e05252; --read:#ef4444;
  --def-fill:#9fb0c4; --def-text:#0e1a2e; --def-tri:#9fb0c4;
  --accent:#22b45f; --accent-soft:rgba(34,180,95,.14);
  --pass-blue:#5b8ef0;
  --shadow:0 2px 6px rgba(0,0,0,.35),0 10px 26px rgba(0,0,0,.3);
  --shadow-lg:0 6px 14px rgba(0,0,0,.4),0 18px 44px rgba(0,0,0,.4);
}
/* Classic = light app chrome with a green turf field */
:root.theme-classic{
  --field:#2e7d43; --band:#2b7640;
  --fline:rgba(255,255,255,.28); --fline10:rgba(255,255,255,.5); --sideline:rgba(255,255,255,.85);
  --yard-num:rgba(255,255,255,.38); --hash:rgba(255,255,255,.32); --los:#ffe14d;
  --block:#ffffff; --ball:#ffd35c; --pull:#ffd35c; --gold:#d98324;
  --motion:#7ff0ae; --reverse:#ff7b6b; --read:#ff5f54;
  --def-fill:#eef2f5; --def-text:#1d4a2a; --def-tri:#eef2f5;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--board);color:var(--chalk);line-height:1.5;
  -webkit-font-smoothing:antialiased;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;}

/* ============ APP HEADER + TABS ============ */
/* Header keeps its own dark palette in every theme */
.app-header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;
  background:linear-gradient(180deg,#16243c 0%,#0f1a2e 100%);
  border-bottom:1px solid #0a1322;box-shadow:0 2px 16px rgba(9,15,28,.35);
  padding:0 18px;height:60px;}
.app-brand{display:flex;align-items:center;gap:10px;font-family:'Oswald';font-weight:700;font-size:19px;
  letter-spacing:2.5px;color:#fff;white-space:nowrap;}
.app-brand .logo{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;
  background:linear-gradient(145deg,#1db363,#0e7a3e);font-size:18px;
  box-shadow:0 2px 10px rgba(20,144,74,.5), inset 0 1px 0 rgba(255,255,255,.25);}
.tabbar{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.tabbar::-webkit-scrollbar{display:none;}
.tabbar .tab{padding:8px 16px;font-family:'Oswald';font-weight:600;font-size:13.5px;text-transform:uppercase;letter-spacing:1px;
  color:#8fa1bc;border-radius:8px;white-space:nowrap;transition:all .14s;}
.tabbar .tab:hover{color:#fff;background:rgba(255,255,255,.07);}
.tabbar .tab.active{color:#fff;background:var(--accent);box-shadow:0 2px 10px rgba(20,144,74,.45);}
.app-header .new-play-btn{white-space:nowrap;}
.app-header .btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18);color:#e8eef7;}
.app-header .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}

.tab-panel{display:none;padding:20px 22px 56px;max-width:1320px;margin:0 auto;animation:fadeIn .18s ease;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

@media (max-width:640px){
  .app-header{gap:8px;padding:0 10px;height:52px;}
  .app-brand{font-size:16px;letter-spacing:1px;}
  .app-brand .logo{width:26px;height:26px;font-size:15px;}
  .app-brand .brand-text{display:none;}
  .tabbar .tab{padding:7px 11px;font-size:12px;letter-spacing:.4px;}
  .tab-panel{padding:14px 12px 56px;}
}

/* ============ COMMON UI ============ */
.lbl{font-family:'Roboto Mono';font-size:10px;color:var(--dim);width:100%;text-transform:uppercase;letter-spacing:1.2px;margin:12px 0 5px;font-weight:600;}
.row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.btn{font-family:'Oswald';font-weight:600;background:var(--panel);color:var(--chalk);border:1px solid var(--border-strong);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;transition:all .12s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px var(--accent-soft);}
.btn.danger{border-color:var(--d);color:var(--d);}
.btn.danger:hover{background:var(--d);color:#fff;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;box-shadow:0 2px 8px var(--accent-soft);}
.btn.primary:hover{filter:brightness(1.08);color:#fff;}
.btn.sm{padding:4px 9px;font-size:11px;border-radius:6px;}

select,input[type=text],input[type=number],textarea{font-family:'Inter';background:var(--panel);color:var(--chalk);border:1px solid var(--border-strong);padding:6px 10px;border-radius:8px;font-size:13px;}
select:focus,input:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
textarea{width:100%;min-height:60px;resize:vertical;}

/* ============ SVG FIELD ============ */
svg.field{display:block;width:100%;height:auto;background:var(--field);border-radius:10px;}

/* ============ LEGEND ============ */
.legend{display:flex;flex-wrap:wrap;gap:8px 22px;padding:10px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;font-family:'Roboto Mono';font-size:10.5px;margin:12px 0 14px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;box-shadow:var(--shadow);}
.legend-item{display:flex;align-items:center;gap:7px;}
.ln{width:24px;flex-shrink:0;border-radius:2px;}
.ln.block{border-top:3.5px solid var(--block);}
.ln.pull{border-top:3px dashed var(--pull);}
.ln.path{border-top:4.5px solid var(--chalk);}
.ln.motion{border-top:3px dashed var(--motion);}
.ln.route{border-top:3.5px solid var(--pass-blue);}

/* ============ VIEWER CARD ============ */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.ph{padding:16px 20px 13px;border-bottom:1px solid var(--border);}
.pn{font-family:'Oswald';font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pn .tag{display:inline-block;font-family:'Roboto Mono';font-size:10px;font-weight:600;color:#fff;background:var(--accent);padding:2px 8px;border-radius:20px;margin-left:9px;vertical-align:middle;letter-spacing:1px;}
.pn .tag.pass{background:var(--pass-blue);}
.pdesc{color:var(--muted);font-size:14px;margin-top:6px;max-width:78ch;}
.assign{padding:6px 20px 20px;}
.assign h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin:16px 0 7px;font-family:'Roboto Mono';font-weight:600;}
.assign table{width:100%;border-collapse:collapse;font-size:13.5px;}
.assign td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:top;}
.assign td:first-child{font-weight:700;width:72px;color:var(--accent);font-family:'Roboto Mono';font-size:12px;}
.note{margin-top:12px;padding:10px 14px;background:var(--accent-soft);border-left:3px solid var(--motion);border-radius:0 8px 8px 0;font-size:13px;color:var(--chalk);}
.youth{margin-top:8px;padding:10px 14px;background:rgba(217,131,36,.09);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:13px;color:var(--chalk);}

/* Animation controls */
.anim{display:flex;align-items:center;gap:9px;padding:10px 16px;background:var(--panel-dark);border-bottom:1px solid var(--border);}
.anim .speed{font-family:'Roboto Mono';font-size:11px;color:var(--muted);margin-left:6px;}
.anim input[type=range]{width:120px;accent-color:var(--accent);}

/* ============ LIBRARY ============ */
.lib-subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.lib-subtab{padding:10px 22px;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:'Oswald';}
.lib-subtab:hover{color:var(--chalk);}
.lib-subtab.active{color:var(--accent);border-bottom-color:var(--accent);}

.home-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
.home-title{font-family:'Oswald';font-size:27px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.home-sub{font-size:13px;color:var(--muted);margin-top:2px;}

.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;margin-top:18px;}
.lib-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:0;cursor:pointer;
  transition:transform .16s,box-shadow .16s,border-color .16s;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow);}
.lib-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.lib-card .thumb{background:var(--field);border-bottom:1px solid var(--border);position:relative;}
.lib-card svg{display:block;margin:0;border-radius:0;width:100%;height:auto;}
.lib-card .type-badge{position:absolute;top:8px;left:8px;font-family:'Roboto Mono';font-size:9.5px;font-weight:600;
  letter-spacing:1px;color:#fff;background:var(--accent);padding:2px 9px;border-radius:20px;pointer-events:none;}
.lib-card .type-badge.pass{background:var(--pass-blue);}
.lib-card .body{padding:12px 14px 14px;}
.lib-card h4{font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;line-height:1.15;}
.lib-card .meta{font-family:'Roboto Mono';font-size:10.5px;color:var(--muted);margin-top:5px;letter-spacing:.5px;}
.lib-card .actions{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap;}
.lib-card .actions .btn.sm{padding:3px 7px;font-size:10.5px;}
.lib-card-new{align-items:center;justify-content:center;min-height:210px;border-style:dashed;border-width:2px;
  display:flex;flex-direction:column;gap:6px;color:var(--accent);box-shadow:none;background:var(--accent-soft);}
.lib-card-new .plus{font-size:46px;font-weight:300;line-height:1;}
.lib-card-new .lbltxt{font-family:'Oswald';font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}

/* Route tree + cards */
.route-tree-pair{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
.route-tree-cell{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow);}
.tree-route{transition:stroke-width .12s;}
.tree-route:hover{stroke-width:3.4;}
.route-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-top:8px;}
.route-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:all .14s;position:relative;box-shadow:var(--shadow);}
.route-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.route-card-num{position:absolute;top:6px;left:8px;font-family:'Roboto Mono';font-size:11px;font-weight:700;color:var(--accent);}
.route-card-name{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;color:var(--chalk);}
.route-card-del{position:absolute;top:4px;right:4px;background:transparent;border:none;color:var(--d);font-size:16px;font-weight:700;cursor:pointer;padding:2px 6px;border-radius:3px;}
.route-card-del:hover{background:var(--d);color:#fff;}
.route-card-new{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;border-style:dashed;}
.route-card-plus{font-size:42px;font-weight:300;color:var(--accent);line-height:1;}
.route-card-pick{padding-top:8px;}

/* ============ EDITOR ============ */
.editor-wrap{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-top:14px;}
@media (max-width:800px){.editor-wrap{grid-template-columns:1fr;}}
.editor-field{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:9px;position:relative;box-shadow:var(--shadow);}
.editor-side{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;max-height:78vh;overflow:auto;box-shadow:var(--shadow);}
.editor-side h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin:12px 0 6px;font-family:'Roboto Mono';font-weight:600;}
.editor-side h3:first-child{margin-top:0;}
.asgn-row{display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid var(--border);font-size:12px;font-family:'Roboto Mono';flex-wrap:wrap;}
.asgn-row .player{font-weight:700;width:30px;color:var(--accent);}
.asgn-row.empty{background:rgba(232,176,61,.08);}
.asgn-row select{font-size:11px;padding:3px 5px;}
.asgn-row input{font-size:11px;padding:3px 5px;width:50px;}

.player-clickable{cursor:pointer;}
.player-clickable:hover{filter:brightness(1.2);}
.def-clickable{cursor:pointer;}
.wp-handle{cursor:grab;}
.wp-handle:hover{filter:brightness(1.15);}
.wp-handle:active{cursor:grabbing;}

.popover{position:absolute;background:var(--panel);border:1px solid var(--border-strong);border-radius:10px;padding:8px;z-index:20;min-width:140px;box-shadow:var(--shadow-lg);}
.popover button{display:block;width:100%;text-align:left;padding:5px 9px;font-size:12px;color:var(--chalk);border-radius:6px;text-transform:uppercase;letter-spacing:.5px;font-family:'Oswald';font-weight:500;}
.popover button:hover{background:var(--accent);color:#fff;}
.popover .pop-title{font-family:'Roboto Mono';font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:3px 9px;margin-bottom:4px;}

/* Route tree picker */
.route-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:8px;}
.route-picker button{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;background:var(--panel);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--chalk);}
.route-picker button:hover{border-color:var(--accent);}
.route-picker svg{width:42px;height:42px;}

.concept-shortcuts{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border-top:1px solid var(--border);margin-top:6px;}
.concept-shortcuts button{font-size:10.5px;padding:4px 8px;background:var(--panel);border:1px solid var(--border);border-radius:3px;color:var(--chalk);}
.concept-shortcuts button:hover{border-color:var(--accent);}

.banner{padding:10px 14px;background:var(--accent-soft);border:1px solid transparent;border-left:3px solid var(--accent);border-radius:8px;font-size:13px;color:var(--chalk);margin-bottom:10px;}

/* ============ SETTINGS ============ */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:14px;flex-wrap:wrap;}
.settings-row label{font-size:14px;font-weight:600;}
.settings-row .desc{font-size:12px;color:var(--muted);margin-top:1px;}

/* ============ MODAL ============ */
.modal{position:fixed;inset:0;background:rgba(10,17,30,.6);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-inner{background:var(--panel);border:1px solid var(--border-strong);border-radius:14px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow:auto;box-shadow:var(--shadow-lg);}
.modal-inner h3{font-size:16px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}

/* ============ PRINT ============ */
@media print{
  :root{--board-dark:#fff;--board:#fff;--panel:#fff;--panel-dark:#fff;--field:#fff;--band:#fff;
    --chalk:#000;--block:#000;--muted:#444;--border:#ccc;
    --fline:#ddd;--fline10:#bbb;--sideline:#888;--yard-num:#ddd;--hash:#e2e2e2;--los:#333;}
  body{background:#fff;color:#000;}
  .app-header,.tabbar,.home-head,.no-print,.anim,.controls,.legend,.editor-side,.popover,#tools{display:none !important;}
  .tab-panel{padding:0;display:none;}
  .tab-panel.printing{display:block;}
  .card,.lib-card{border:1px solid #000;page-break-inside:avoid;break-inside:avoid;margin-bottom:6mm;}
  svg.field{background:#fff;}
  /* Wristband sheet: 4x3 = 12 plays per page */
  .wristband-page{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:3mm;page-break-after:always;height:265mm;}
  .wristband-cell{border:1px solid #000;padding:2mm;page-break-inside:avoid;}
  .wristband-cell .code{font-family:'Roboto Mono';font-size:11px;font-weight:700;}
  .wristband-cell .name{font-size:11px;font-weight:600;text-transform:uppercase;}
  .wristband-cell svg{width:100%;height:auto;}
  /* Practice card: one play per page */
  .practice-card{page-break-after:always;}
  .practice-card svg{max-height:140mm;}
  /* Call sheet */
  .callsheet h2{font-size:14px;margin-top:5mm;border-bottom:1px solid #000;padding-bottom:1mm;}
  .callsheet ul{list-style:none;padding:0;font-size:11px;}
  .callsheet li{padding:1mm 0;border-bottom:1px dotted #999;}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-brand"><span class="logo">🏈</span><span class="brand-text">PLAYBOOK</span></div>
  <nav class="tabbar">
    <button class="tab active" data-tab="playbook">Playbook</button>
    <button class="tab" data-tab="viewer">Play</button>
    <button class="tab" data-tab="build">Build</button>
    <button class="tab" data-tab="templates">Templates</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>
  <button class="btn primary new-play-btn" id="hdr-new-play">+ New Play</button>
</header>

<section id="library-tab" class="tab-panel active"></section>
<section id="viewer-tab" class="tab-panel"></section>
<section id="editor-tab" class="tab-panel"></section>
<section id="templates-tab" class="tab-panel"></section>
<section id="settings-tab" class="tab-panel"></section>
<div id="print-area"></div>

<script>
// ============================================================
// CONSTANTS — field geometry
// ============================================================
const W=1080, H=580, MID=W/2;
const LOS=350, YPP=10;
const FL=30, FR=W-30;
const gap=46;
const OLy=LOS+12;
const OL={LT:MID-2*gap, LG:MID-gap, C:MID, RG:MID+gap, RT:MID+2*gap};
const ONL=OLy;       // on-line y for receivers
const OFL=OLy+22;    // off-line y
const splitO=64;
const y = yd => LOS - yd*YPP;
const QBg={x:MID, y:LOS+72};   // gun QB
const QBu={x:MID, y:LOS+34};   // under-center QB

// Direction flip
let FLIP=false;
const mx = x => FLIP ? (W - x) : x;
function mpath(d){
  if(!FLIP) return d;
  return d.replace(/([MLQTC])([^MLQTCZ]*)/g, (m,cmd,nums)=>{
    const vals = nums.trim().split(/[\s,]+/).filter(s=>s!=='').map(Number);
    for(let i=0;i<vals.length;i+=2) vals[i] = W - vals[i];
    return cmd + ' ' + vals.join(' ') + ' ';
  });
}

// ============================================================
// FORMATIONS — offensive personnel positions

function resolveDefender(role, defenseKey){
  const def = DEFENSES[defenseKey];
  if(!def || !def.positions) return null;
  // Allow direct id lookup as fallback
  if(def.positions[role]) return def.positions[role];
  const id = def.roles[role];
  return id ? def.positions[id] : null;
}

// ============================================================
// ROUTE TREES — receiver (9) and RB (5)
// Each route returns waypoint array starting at the receiver's spot
// ============================================================
// All receiver routes return waypoints describing the polyline of the route.
// The renderer draws sharp line segments at break points (no curves).
// Route shapes match the PlayMakerX route tree. inDir = toward the middle of
// the field, outDir = toward the nearest sideline. Each returns the polyline
// waypoints from the receiver's spot to the route's end (sharp breaks).
const RECEIVER_ROUTES = {
  // 9 — Go: vertical straight up the field
  go:    (sx,sy,depth=18)=> [[sx, sy - depth*YPP]],
  // 11 — Hitch: 5-yd stem, short hook back INWARD toward the QB
  hitch: (sx,sy,depth=5)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx, sy - d], [sx + inDir*14, sy - d + 16]];
  },
  // 2 — Slant: 3-yd stem, flat angled break inside across the face
  slant: (sx,sy,depth=3)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx, sy - d], [sx + inDir*120, sy - d - 52]];
  },
  // 5 — Out: 8-yd stem, sharp 90° break to the sideline
  out:   (sx,sy,depth=8)=>{
    const d = depth*YPP, outDir = (sx < MID) ? -1 : 1;
    return [[sx, sy - d], [sx + outDir*70, sy - d]];
  },
  // 6 — Dig (In): 10-yd stem, sharp 90° break across the middle
  dig:   (sx,sy,depth=10)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx, sy - d], [sx + inDir*95, sy - d]];
  },
  // 7 — Post: 10-yd stem, 45° diagonal toward the goalpost (inside)
  post:  (sx,sy,depth=10)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx, sy - d], [sx + inDir*80, sy - d - 95]];
  },
  // 8 — Corner: 9-yd stem, 45° diagonal toward the back pylon (outside)
  corner:(sx,sy,depth=9)=>{
    const d = depth*YPP, outDir = (sx < MID) ? -1 : 1;
    return [[sx, sy - d], [sx + outDir*80, sy - d - 95]];
  },
  // 10 — Flat: quick release out toward the sideline at low depth
  flat:  (sx,sy,depth=2)=>{
    const d = depth*YPP, outDir = (sx < MID) ? -1 : 1;
    return [[sx + outDir*25, sy - d], [sx + outDir*85, sy - d - 10]];
  },
  // 3 — Comeback: 10-yd stem, sharp hook back DOWN & OUT to the sideline
  comeback: (sx,sy,depth=10)=>{
    const d = depth*YPP, outDir = (sx < MID) ? -1 : 1;
    return [[sx, sy - d], [sx + outDir*20, sy - d + 22]];
  },
  // 4 — Curl: 9-yd stem, hook back DOWN & IN toward the QB
  curl: (sx,sy,depth=9)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx, sy - d], [sx + inDir*22, sy - d + 22]];
  },
  // 1 — Quick Out: 3-yd stem, sharp 90° break to the sideline
  quick_out: (sx,sy,depth=3)=>{
    const d = depth*YPP, outDir = (sx < MID) ? -1 : 1;
    return [[sx, sy - d], [sx + outDir*70, sy - d]];
  },
  // 0 — Screen: bubble back behind the LOS, working back toward the QB
  screen: (sx,sy)=>{
    const inDir = (sx < MID) ? 1 : -1;
    return [[sx + inDir*22, sy + 18], [sx + inDir*78, sy + 8]];
  },
  // Now: small quick bubble back behind the LOS toward the QB (extra)
  now:   (sx,sy)=>{
    const inDir = (sx < MID) ? 1 : -1;
    return [[sx + inDir*16, sy + 12], [sx + inDir*46, sy + 6]];
  },
  // Drag: low crossing route across the field (kept as an extra)
  drag: (sx,sy,depth=4)=>{
    const d = depth*YPP, inDir = (sx < MID) ? 1 : -1;
    return [[sx + inDir*15, sy - d], [sx + inDir*200, sy - d - 5]];
  },
};

// RB routes — all assume start in the backfield (sy > LOS)
const RB_ROUTES = {
  // Straight vertical from backfield
  go:    (sx,sy)=>[[sx, sy - 150]],
  // Slide to same-side flat (low horizontal release)
  out:   (sx,sy)=>[[sx + 30, sy - 8], [sx + 90, sy - 8]],
  // Slide to opposite flat
  in:    (sx,sy)=>[[sx - 30, sy - 8], [sx - 90, sy - 8]],

  wheel: (sx,sy)=>[[sx + 35, sy - 12], [sx + 75, sy - 18], [sx + 88, sy - 140]],

  texas: (sx,sy)=>[[sx + 40, sy - 25], [sx - 25, sy - 90]],
};

// Route tree icon (mini SVG of the path shape, for the picker)
function routeIcon(routeKey, isRB){
  const tree = isRB ? RB_ROUTES : RECEIVER_ROUTES;
  const fn = tree[routeKey]; if(!fn) return '';
  const sx=21, sy=38;
  const pts = [[sx,sy], ...fn(sx,sy).map(p=>[Math.max(2,Math.min(40,p[0])), Math.max(2,Math.min(40,p[1]))])];
  const d = 'M ' + pts.map(p=>p.join(' ')).join(' L ');
  return `<svg viewBox="0 0 42 42"><circle cx="${sx}" cy="${sy}" r="3" fill="var(--gold)"/><path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" marker-end="url(#mini-ah)"/></svg>`;
}

// ============================================================
// MOTION PRESETS — produce a waypoint path for a given motion type.
// Input: start coords (sx, sy), QB coords, direction ('R' or 'L'),
//        full skill map (to find QB).
// Returns: { waypoints: [...], endX, endY } — endX/endY = where the
//          player effectively ends up at the snap.
// ============================================================
const MOTION_PRESETS = {
  jet: (sx, sy, qbx, qby, dir) => {
    const sign = dir === 'R' ? 1 : -1;
    const cross = qbx + sign * 12;
    return { waypoints: [[(sx+cross)/2, sy - 6], [cross, sy - 6]], endX: cross, endY: sy - 6 };
  },
  orbit: (sx, sy, qbx, qby, dir) => {
    const sign = dir === 'R' ? 1 : -1;
    return { waypoints: [[qbx - sign*30, qby + 22], [qbx + sign*30, qby + 18]], endX: qbx + sign*30, endY: qby + 18 };
  },
  short: (sx, sy, qbx, qby, dir) => {
    const sign = dir === 'R' ? 1 : -1;
    return { waypoints: [[sx + sign*40, sy]], endX: sx + sign*40, endY: sy };
  },
  across: (sx, sy, qbx, qby, dir) => {
    const sign = dir === 'R' ? 1 : -1;
    const target = (sx < MID) ? MID + (MID - sx) : MID - (sx - MID);
    return { waypoints: [[MID, sy - 2], [target, sy - 2]], endX: target, endY: sy - 2 };
  },
};

// Compute motion path + end position for a given play
function computeMotion(play, skill){
  if(!play.motion || !play.motion.player || !play.motion.type) return null;
  const p = skill[play.motion.player];
  if(!p) return null;
  const fn = MOTION_PRESETS[play.motion.type];
  if(!fn){
    // Custom — use waypoints stored directly
    if(play.motion.waypoints) return { waypoints: play.motion.waypoints, endX: play.motion.waypoints[play.motion.waypoints.length-1][0], endY: play.motion.waypoints[play.motion.waypoints.length-1][1] };
    return null;
  }
  const qb = skill.QB || {x:MID, y:LOS+72};
  return fn(p.x, p.y, qb.x, qb.y, play.motion.direction || 'R');
}

// ============================================================
// CONCEPT SHORTCUTS — assignments diff applied to a play
// ============================================================
// Pass concepts defined by ALIGNMENT ROLE, not by fixed player letters, so they
// stay correct in every formation. Roles are resolved at apply-time from where
// each receiver actually lines up:
//   strongOut/strongSlot/strongInner = receivers on the 3-or-2-man (strong) side,
//   weakOut/weakSlot = receivers on the backside, back = a releasing RB/FB.
// A `mirror` concept applies the same out/slot routes to BOTH sides.
// Routes "fan" on a 3-receiver (trips) side so they don't pile up: the outermost
// works the perimeter/clears, the middle takes the intermediate route, and the
// inner takes the underneath. `back` is the RB's checkdown — it's skipped when a
// trips inner already runs the underneath flat (so you don't get two flats).
const CONCEPTS = {
  // Stick: outside clears vertical, slot sticks (quick out), inner/RB to the flat,
  // backside slant. Hi-lo the flat defender.
  Stick:     { strongOut:{tree:'go'}, strongSlot:{tree:'out',depth:5}, strongInner:{tree:'flat',depth:2}, weakOut:{tree:'slant',depth:3}, weakSlot:{tree:'slant',depth:3}, back:{tree:'flat',depth:2} },
  // Smash: outside hitch under, slot corner over — hi-lo the corner. Trips inner runs a seam.
  Smash:     { strongOut:{tree:'hitch',depth:6}, strongSlot:{tree:'corner',depth:10}, strongInner:{tree:'go'}, weakOut:{tree:'hitch',depth:6}, weakSlot:{tree:'corner',depth:10} },
  // Mesh: two shallow crossers meet (the mesh), a sit in the middle, a corner/wheel, and a flat.
  Mesh:      { strongOut:{tree:'drag',depth:5}, strongSlot:{tree:'hitch',depth:8}, strongInner:{tree:'corner',depth:10}, weakOut:{tree:'drag',depth:5}, weakSlot:{tree:'corner',depth:10}, back:{tree:'flat',depth:3} },
  // Flood: 3-level stretch to the strong side (go / out / flat) + backside dig & curl.
  Flood:     { strongOut:{tree:'go'}, strongSlot:{tree:'out',depth:12}, strongInner:{tree:'flat',depth:3}, weakOut:{tree:'dig',depth:14}, weakSlot:{tree:'curl',depth:10}, back:{tree:'flat',depth:3} },
  // Levels: two in-breakers at two depths (dig over a shallow in), inner seam, backside comeback.
  Levels:    { strongOut:{tree:'dig',depth:12}, strongSlot:{tree:'dig',depth:5}, strongInner:{tree:'go'}, weakOut:{tree:'comeback',depth:10}, weakSlot:{tree:'flat',depth:2}, back:{tree:'flat',depth:2} },
  // Sail: outside vertical, deep sail (out ~14), flat underneath + backside dig & curl.
  Sail:      { strongOut:{tree:'go'}, strongSlot:{tree:'out',depth:14}, strongInner:{tree:'flat',depth:2}, weakOut:{tree:'dig',depth:5}, weakSlot:{tree:'curl',depth:10}, back:{tree:'flat',depth:2} },
  // Curl-Flat: outside curl, slot flat — hi-lo the flat (both sides). Trips inner runs a seam.
  'Curl-Flat':{ strongOut:{tree:'curl',depth:10}, strongSlot:{tree:'flat',depth:2}, strongInner:{tree:'go'}, weakOut:{tree:'curl',depth:10}, weakSlot:{tree:'flat',depth:2} },
  // Snag: triangle — snag/spot (slant-sit) outside, corner over, flat under; backside hitch+curl.
  Snag:      { strongOut:{tree:'slant',depth:3}, strongSlot:{tree:'corner',depth:10}, strongInner:{tree:'flat',depth:2}, weakOut:{tree:'hitch',depth:6}, weakSlot:{tree:'curl',depth:8}, back:{tree:'flat',depth:2} },
  // Y-Cross: vertical clear outside, deep crosser from the slot, inner drag, backside comeback + flat.
  'Y-Cross': { strongOut:{tree:'go'}, strongSlot:{tree:'dig',depth:14}, strongInner:{tree:'drag',depth:5}, weakOut:{tree:'comeback',depth:8}, weakSlot:{tree:'flat',depth:2}, back:{tree:'flat',depth:2} },
  // Four Verticals: everybody go (inner slots run seams).
  Verticals: { mirror:{ out:{tree:'go'}, slot:{tree:'go'} } },
};

// Classify the receivers in a formation by side and how far outside they align.
// Returns { left:[outer..inner], right:[outer..inner], backs:[...] }.
function classifyReceivers(skill){
  const left=[], right=[], backs=[];
  for(const k of ['X','Z','Y','H','RB']){
    const p = skill[k]; if(!p) continue;
    const isBack = (p.y > LOS+40) && Math.abs(p.x - MID) < 90;  // in the backfield
    if(isBack){ backs.push({k, x:p.x}); continue; }
    (p.x < MID ? left : right).push({k, x:p.x});
  }
  left.sort((a,b)=>a.x-b.x);    // smallest x = outermost on the left
  right.sort((a,b)=>b.x-a.x);   // largest x  = outermost on the right
  return { left:left.map(o=>o.k), right:right.map(o=>o.k), backs:backs.map(o=>o.k) };
}

// Apply a concept to the draft's assignments using the formation's real alignment.
function applyConcept(conceptKey, skill, assignments){
  const spec = CONCEPTS[conceptKey]; if(!spec) return;
  const { left, right, backs } = classifyReceivers(skill);
  const strong = right.length >= left.length ? right : left;
  const weak   = strong === right ? left : right;
  const assigned = new Set();
  const set = (player, route) => {
    if(player && route){ assignments[player] = { kind:'route', ...route }; assigned.add(player); }
  };
  if(spec.mirror){
    for(const sideArr of [strong, weak]){
      if(spec.mirror.out) set(sideArr[0], spec.mirror.out);
      for(let i=1;i<sideArr.length;i++) if(spec.mirror.slot) set(sideArr[i], spec.mirror.slot);
    }
  } else {
    set(strong[0], spec.strongOut);
    set(strong[1], spec.strongSlot);
    set(strong[2], spec.strongInner);
    set(weak[0],   spec.weakOut);
    set(weak[1],   spec.weakSlot);
    // The RB checkdown is skipped when a trips inner already runs the underneath
    // flat — otherwise you'd get two flats stacked on the same side.
    const innerFlat = spec.strongInner && spec.strongInner.tree === 'flat' && strong[2];
    if(spec.back && !innerFlat) set(backs[0], spec.back);
  }
  // Any split receiver the concept didn't name gets a tidy default so the play
  // still looks complete (outermost = comeback to the sideline, inside = sit).
  for(const k of [...left, ...right]){
    if(assigned.has(k)) continue;
    const outer = (skill[k].x < MID) ? left[0] : right[0];
    set(k, k === outer ? {tree:'comeback',depth:10} : {tree:'hitch',depth:6});
  }
}

// ============================================================
// SVG PRIMITIVES — drawing functions used by renderer
// ============================================================
function olDot(x, txt){
  x = mx(x);
  // Center renders as a rounded square; other OL as circles. Outlined (not filled)
  // so the colored skill players pop against them.
  if(txt === 'C'){
    return `<rect x="${x-12}" y="${OLy-12}" width="24" height="24" rx="4" ry="4" fill="var(--field)" stroke="var(--block)" stroke-width="2.4"/>`
      + `<text x="${x}" y="${OLy+4.5}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="12.5" fill="var(--block)">${txt}</text>`;
  }
  return `<circle cx="${x}" cy="${OLy}" r="12" fill="var(--field)" stroke="var(--block)" stroke-width="2.4"/>`
    + `<text x="${x}" y="${OLy+4.5}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="12.5" fill="var(--block)">${txt}</text>`;
}
function skillDot(x, yy, id, col, label){
  col = col || 'var(--muted)';
  x = mx(x);
  const txt = label || id;
  // Auto-shrink font for multi-char labels so they fit the dot
  const fs = txt.length >= 3 ? 9 : txt.length === 2 ? 10.5 : 12.5;
  // Solid colored circle with a white letter — the thin dark outline behind the
  // letter (paint-order:stroke) keeps it readable on lighter fills like gold
  return `<circle cx="${x}" cy="${yy}" r="13" fill="${col}" stroke="var(--field)" stroke-width="2.2" data-player="${id}"/>`
    + `<text x="${x}" y="${yy+4.5}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="${fs}" fill="#fff" style="paint-order:stroke" stroke="rgba(0,0,0,.38)" stroke-width="1.8" pointer-events="none">${txt}</text>`;
}
function defDot(x, yy, txt, isRead, role){
  x = mx(x);
  const fill = isRead ? 'var(--read)' : 'var(--def-fill)';
  const text = isRead ? '#fff' : 'var(--def-text)';
  const tag = role ? `data-role="${role}"` : '';
  // Downward triangle: top edge above center, point below — sized so the letter reads clearly
  const top = yy - 13, bot = yy + 11;
  const half = 16;
  const points = `${x-half},${top} ${x+half},${top} ${x},${bot}`;
  const readRing = isRead
    ? `<circle cx="${x}" cy="${yy-3}" r="22" fill="none" stroke="var(--read)" stroke-width="2.2" stroke-dasharray="4 3"/>`
    : '';
  // Two-character labels shrink to fit
  const fontSize = txt.length >= 2 ? 11.5 : 14.5;
  const textY = yy - 1;
  return readRing
    + `<polygon points="${points}" fill="${fill}" stroke="var(--field)" stroke-width="1.6" ${tag}/>`
    + `<text x="${x}" y="${textY}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="${fontSize}" fill="${text}" pointer-events="none">${txt}</text>`;
}
function ballMark(x, yy){
  x = mx(x);
  return ballSVG(x, yy, 8);
}

function blockLine(x1,y1,x2,y2){
  x1 = mx(x1); x2 = mx(x2);
  const a = Math.atan2(y2-y1, x2-x1);
  const sx = x1 + Math.cos(a)*12, sy = y1 + Math.sin(a)*12;
  const ang = Math.atan2(y2-sy, x2-sx); const tl = 9;
  const tx = Math.cos(ang+Math.PI/2)*tl, ty = Math.sin(ang+Math.PI/2)*tl;
  return `<line class="anim-path" x1="${sx}" y1="${sy}" x2="${x2}" y2="${y2}" stroke="var(--block)" stroke-width="3.4" stroke-linecap="round"/>`
    + `<line x1="${x2-tx}" y1="${y2-ty}" x2="${x2+tx}" y2="${y2+ty}" stroke="var(--block)" stroke-width="3.4" stroke-linecap="round"/>`;
}

// label1 / label2 = labels for the two OL (e.g. "LG" and "C"). The OL closer to
// the LB becomes the climber and gets a small labeled badge at their release point;
// the other gets a small dot indicating they stay on the double-team.
function comboBlock(x1, x2, defx, defy, lbx, lby, label1, label2){
  x1=mx(x1); x2=mx(x2); defx=mx(defx);
  const meetX = defx;
  const meetY = defy - 4;
  let g = '';
  // Two converging block lines (the V)
  g += `<line class="anim-path" x1="${x1}" y1="${OLy-12}" x2="${meetX}" y2="${meetY}" stroke="var(--block)" stroke-width="3.4" stroke-linecap="round"/>`;
  g += `<line class="anim-path" x1="${x2}" y1="${OLy-12}" x2="${meetX}" y2="${meetY}" stroke="var(--block)" stroke-width="3.4" stroke-linecap="round"/>`;
  // Double-bracket cap = double-team notation
  const capY = meetY - 8, capH = 6, capW = 9;
  g += `<line x1="${meetX-capW}" y1="${capY-capH}" x2="${meetX-capW}" y2="${capY+capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  g += `<line x1="${meetX-capW}" y1="${capY-capH}" x2="${meetX-capW+4}" y2="${capY-capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  g += `<line x1="${meetX-capW}" y1="${capY+capH}" x2="${meetX-capW+4}" y2="${capY+capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  g += `<line x1="${meetX+capW}" y1="${capY-capH}" x2="${meetX+capW}" y2="${capY+capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  g += `<line x1="${meetX+capW}" y1="${capY-capH}" x2="${meetX+capW-4}" y2="${capY-capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  g += `<line x1="${meetX+capW}" y1="${capY+capH}" x2="${meetX+capW-4}" y2="${capY+capH}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  if(lbx != null && lby != null){
    const lbX = mx(lbx);
    // Closer OL climbs; the other stays
    const climberIs1 = Math.abs(x1 - lbX) < Math.abs(x2 - lbX);
    const startX = climberIs1 ? x1 : x2;
    const stayX  = climberIs1 ? x2 : x1;
    const climberLabel = (climberIs1 ? label1 : label2) || '';
    const sideDir = (lbX > startX) ? 1 : -1;
    const ctrlX = startX + sideDir * 24;
    const ctrlY = capY - 22;
    g += `<path class="anim-path" d="M ${startX} ${OLy-12} Q ${ctrlX} ${ctrlY} ${lbX} ${lby+9}" fill="none" stroke="var(--block)" stroke-width="2.6" stroke-dasharray="5 3"/>`;
    // Block cap on the linebacker at the end of the climb
    {
      const angC = Math.atan2((lby+9)-ctrlY, lbX-ctrlX);
      const tlC = 8, txC = Math.cos(angC+Math.PI/2)*tlC, tyC = Math.sin(angC+Math.PI/2)*tlC;
      g += `<line x1="${(lbX-txC).toFixed(1)}" y1="${(lby+9-tyC).toFixed(1)}" x2="${(lbX+txC).toFixed(1)}" y2="${(lby+9+tyC).toFixed(1)}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
    }
    // Climber badge: small filled chip with the OL letter at the release point
    if(climberLabel){
      const badgeW = Math.max(14, climberLabel.length * 6 + 4);
      g += `<rect x="${startX - badgeW/2}" y="${OLy-22}" width="${badgeW}" height="10" rx="2" ry="2" fill="var(--field)" stroke="var(--block)" stroke-width="1"/>`;
      g += `<text x="${startX}" y="${OLy-14}" text-anchor="middle" font-family="Roboto Mono" font-weight="700" font-size="8" fill="var(--block)">${climberLabel}</text>`;
    }
    // Non-climber: small dot indicating they stay on the double-team
    g += `<circle cx="${stayX}" cy="${OLy-15}" r="2.5" fill="var(--block)"/>`;
  }
  return g;
}

// SCOOP: single OL blocks down on a defender, then climbs to a LB.
// Solid line from OL to the defender, dashed continuation from the defender to the LB.
// Small label at the bend (the defender) showing which OL is doing it.
function scoopBlock(x1, defx, defy, lbx, lby, label){
  x1 = mx(x1); defx = mx(defx);
  let g = '';
  const meetX = defx, meetY = defy - 4;
  // Solid block-down line
  g += `<line class="anim-path" x1="${x1}" y1="${OLy-12}" x2="${meetX}" y2="${meetY}" stroke="var(--block)" stroke-width="3.4" stroke-linecap="round"/>`;
  // T-bar cap on the defender (single block, not double-team)
  const capY = meetY - 8;
  g += `<line x1="${meetX-9}" y1="${capY}" x2="${meetX+9}" y2="${capY}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
  if(lbx != null && lby != null){
    const lbX = mx(lbx);
    const sideDir = (lbX > meetX) ? 1 : -1;
    const ctrlX = meetX + sideDir * 20;
    const ctrlY = capY - 18;
    g += `<path class="anim-path" d="M ${meetX} ${capY} Q ${ctrlX} ${ctrlY} ${lbX} ${lby+9}" fill="none" stroke="var(--block)" stroke-width="2.6" stroke-dasharray="5 3"/>`;
    // Block cap on the linebacker at the end of the climb
    {
      const angC = Math.atan2((lby+9)-ctrlY, lbX-ctrlX);
      const tlC = 8, txC = Math.cos(angC+Math.PI/2)*tlC, tyC = Math.sin(angC+Math.PI/2)*tlC;
      g += `<line x1="${(lbX-txC).toFixed(1)}" y1="${(lby+9-tyC).toFixed(1)}" x2="${(lbX+txC).toFixed(1)}" y2="${(lby+9+tyC).toFixed(1)}" stroke="var(--block)" stroke-width="2.6" stroke-linecap="round"/>`;
    }
    // OL-letter badge at the bend
    if(label){
      const badgeW = Math.max(14, label.length * 6 + 4);
      g += `<rect x="${meetX - badgeW/2}" y="${capY - 22}" width="${badgeW}" height="10" rx="2" ry="2" fill="var(--field)" stroke="var(--block)" stroke-width="1"/>`;
      g += `<text x="${meetX}" y="${capY - 14}" text-anchor="middle" font-family="Roboto Mono" font-weight="700" font-size="8" fill="var(--block)">${label}</text>`;
    }
  }
  return g;
}

function P(d, col, dash, mk, width){
  col = col || 'var(--ball)';
  const dd = dash ? `stroke-dasharray="${dash}"` : '';
  const w = width || 2.8;
  const me = mk === 'none' ? '' : `marker-end="url(#${mk||'ah'})"`;
  return `<path class="anim-path" d="${mpath(d)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linejoin="round" stroke-linecap="round" ${dd} ${me}/>`;
}

// Perpendicular block cap ("T") at the end of a block path — the standard
// diagram notation for a block. (px,py) = last control/waypoint before the end
// (sets the tangent). Raw coords; the direction flip is applied here so it
// matches mpath'd paths.
function capAt(px, py, ex, ey){
  const x1 = mx(px), x2 = mx(ex);
  const ang = Math.atan2(ey - py, x2 - x1);
  const tl = 8, tx = Math.cos(ang + Math.PI/2)*tl, ty = Math.sin(ang + Math.PI/2)*tl;
  return `<line x1="${(x2-tx).toFixed(1)}" y1="${(ey-ty).toFixed(1)}" x2="${(x2+tx).toFixed(1)}" y2="${(ey+ty).toFixed(1)}" stroke="var(--block)" stroke-width="2.8" stroke-linecap="round"/>`;
}

// Waypoint path that ends in a block cap instead of an arrow — for blocks that
// travel (lead blocks). Mirrors pathWithTip's flip handling.
function pathWithCap(start, wps, sharp, col, dash, width){
  if(!wps || !wps.length) return '';
  const flipPt = p => FLIP ? [W - p[0], p[1]] : [p[0], p[1]];
  const s = flipPt([start.x, start.y]);
  const pts = wps.map(flipPt);
  let d = `M ${s[0]} ${s[1]}`;
  if(sharp){
    for(const p of pts) d += ` L ${p[0]} ${p[1]}`;
  } else if(pts.length === 1){
    d += ` L ${pts[0][0]} ${pts[0][1]}`;
  } else {
    for(let i=0;i<pts.length-1;i++) d += ` Q ${pts[i][0]} ${pts[i][1]} ${pts[i+1][0]} ${pts[i+1][1]}`;
  }
  const dd = dash ? `stroke-dasharray="${dash}"` : '';
  const c = col || 'var(--block)';
  const line = `<path class="anim-path" d="${d}" fill="none" stroke="${c}" stroke-width="${width||2.8}" stroke-linejoin="round" stroke-linecap="round" ${dd}/>`;
  const end = pts[pts.length-1], prev = pts.length >= 2 ? pts[pts.length-2] : s;
  const ang = Math.atan2(end[1]-prev[1], end[0]-prev[0]);
  const tl = 8, tx = Math.cos(ang+Math.PI/2)*tl, ty = Math.sin(ang+Math.PI/2)*tl;
  return line + `<line x1="${(end[0]-tx).toFixed(1)}" y1="${(end[1]-ty).toFixed(1)}" x2="${(end[0]+tx).toFixed(1)}" y2="${(end[1]+ty).toFixed(1)}" stroke="${c}" stroke-width="2.8" stroke-linecap="round"/>`;
}

// Draw an arrow tip as a literal polygon at (endX, endY), pointing in the direction
// of (prevX,prevY)→(endX,endY). Used as a guaranteed-visible fallback to SVG markers.
function arrowTip(prevX, prevY, endX, endY, fill, size){
  const ang = Math.atan2(endY - prevY, endX - prevX);
  const s = size || 10;
  // Tip slightly past the endpoint so the visible arrow sits on the line end
  const tipX = endX + Math.cos(ang) * (s * 0.4);
  const tipY = endY + Math.sin(ang) * (s * 0.4);
  // Two base corners, swept back from the tip
  const back = Math.PI * 0.82;  // ~148° spread from tip direction
  const bx1 = tipX + Math.cos(ang + back) * s;
  const by1 = tipY + Math.sin(ang + back) * s;
  const bx2 = tipX + Math.cos(ang - back) * s;
  const by2 = tipY + Math.sin(ang - back) * s;
  return `<polygon points="${tipX.toFixed(1)},${tipY.toFixed(1)} ${bx1.toFixed(1)},${by1.toFixed(1)} ${bx2.toFixed(1)},${by2.toFixed(1)}" fill="${fill}"/>`;
}

// Polyline with rounded corners: crisp breaks, but each corner turns through a
// small arc instead of a hard point — the PlayMakerX route look. pts are
// absolute (already flipped) [[x,y],...].
function roundedPathD(pts, r){
  r = r || 12;
  if(pts.length < 2) return '';
  let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=1;i<pts.length-1;i++){
    const p0 = pts[i-1], p1 = pts[i], p2 = pts[i+1];
    const v1 = [p1[0]-p0[0], p1[1]-p0[1]], v2 = [p2[0]-p1[0], p2[1]-p1[1]];
    const l1 = Math.hypot(v1[0], v1[1]) || 1, l2 = Math.hypot(v2[0], v2[1]) || 1;
    const r1 = Math.min(r, l1/2), r2 = Math.min(r, l2/2);
    const a = [p1[0]-v1[0]/l1*r1, p1[1]-v1[1]/l1*r1];
    const b = [p1[0]+v2[0]/l2*r2, p1[1]+v2[1]/l2*r2];
    d += ` L ${a[0].toFixed(1)} ${a[1].toFixed(1)} Q ${p1[0].toFixed(1)} ${p1[1].toFixed(1)} ${b[0].toFixed(1)} ${b[1].toFixed(1)}`;
  }
  const last = pts[pts.length-1];
  d += ` L ${last[0].toFixed(1)} ${last[1].toFixed(1)}`;
  return d;
}

// Path + arrow tip in one call. Returns SVG that draws the line and a guaranteed
// arrow at the endpoint computed from the last segment's tangent.
function pathWithTip(start, wps, sharp, col, dash, width, tipSize){
  if(!wps || !wps.length) return '';
  // Mirror waypoints if flipped (consistent with mpath)
  const W2 = W;
  const flipPt = p => FLIP ? [W2 - p[0], p[1]] : [p[0], p[1]];
  const s = flipPt([start.x, start.y]);
  const pts = wps.map(flipPt);
  // Build path string from already-flipped points
  let d;
  if(sharp){
    // "Sharp" = defined breaks, drawn with small rounded corners
    d = roundedPathD([s, ...pts], 13);
  } else {
    d = `M ${s[0]} ${s[1]}`;
    if(pts.length === 1) d += ` L ${pts[0][0]} ${pts[0][1]}`;
    else for(let i=0;i<pts.length-1;i++) d += ` Q ${pts[i][0]} ${pts[i][1]} ${pts[i+1][0]} ${pts[i+1][1]}`;
  }
  const w = width || 3.2;
  const dd = dash ? `stroke-dasharray="${dash}"` : '';
  const c = col || 'var(--ball)';
  const line = `<path class="anim-path" d="${d}" fill="none" stroke="${c}" stroke-width="${w}" stroke-linejoin="round" stroke-linecap="round" ${dd}/>`;
  // Compute tip direction from the last two points
  const end = pts[pts.length-1];
  const prev = pts.length >= 2 ? pts[pts.length-2] : s;
  const tip = arrowTip(prev[0], prev[1], end[0], end[1], c, tipSize || 11);
  return line + tip;
}
function pullPath(d){ return P(d, 'var(--pull)', '7 4', 'ahp'); }
function carryPath(d){ return `<path class="anim-path" d="${mpath(d)}" fill="none" stroke="var(--ball)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah)"/>`; }
function motionPath(d){ return P(d, 'var(--motion)', '6 4', 'ahm'); }
function reversePath(d){ return P(d, 'var(--reverse)', null, 'ahr'); }

function stalkLocal(rx, ry, dx, dy){
  // Stalk block: run all the way to the defender being blocked and cap with the
  // block "T" just short of his marker — so it's clear exactly who the WR has.
  const rrx=mx(rx), ddx=mx(dx);
  const ang=Math.atan2(dy-ry, ddx-rrx);
  const sx=rrx+Math.cos(ang)*13, sy=ry+Math.sin(ang)*13;
  const ex=ddx-Math.cos(ang)*19, ey=dy-Math.sin(ang)*19;
  const tl=8, tx=Math.cos(ang+Math.PI/2)*tl, ty=Math.sin(ang+Math.PI/2)*tl;
  return `<line class="anim-path" x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="var(--block)" stroke-width="2.8" stroke-linecap="round"/>`
    + `<line x1="${ex-tx}" y1="${ey-ty}" x2="${ex+tx}" y2="${ey+ty}" stroke="var(--block)" stroke-width="2.8" stroke-linecap="round"/>`;
}

// Build SVG path string from start + waypoints.
// sharp=true → use straight line segments (L) for crisp angles (routes).
// sharp=false (default) → use quadratic Bézier (Q) for smooth curves (carries, pulls).
function pathFromWaypoints(start, wps, sharp){
  if(!wps || !wps.length) return '';
  let d = `M ${start.x} ${start.y}`;
  if(sharp){
    for(const p of wps){ d += ` L ${p[0]} ${p[1]}`; }
    return d;
  }
  if(wps.length === 1){
    d += ` L ${wps[0][0]} ${wps[0][1]}`;
  } else {
    for(let i=0;i<wps.length-1;i++){
      d += ` Q ${wps[i][0]} ${wps[i][1]} ${wps[i+1][0]} ${wps[i+1][1]}`;
    }
  }
  return d;
}

// ============================================================
// RENDERER — assignment-driven SVG generation
// ============================================================
function renderFrame(inner){
  // Subtle alternating 5-yard shading bands, aligned to the LOS
  let bands = '';
  const bandH = 5 * YPP;
  for(let k = -5; k < 8; k++){
    if(((k % 2) + 2) % 2 === 0) continue;
    const yTop = Math.max(0, LOS - (k+1)*bandH);
    const yBot = Math.min(H, LOS - k*bandH);
    if(yBot <= 0 || yTop >= H || yBot <= yTop) continue;
    bands += `<rect x="${FL}" y="${yTop}" width="${FR-FL}" height="${yBot-yTop}" fill="var(--band)"/>`;
  }
  let grid = '';
  // Horizontal yard lines every 5 yards (brighter every 10), covering backfield too
  for(let yd = -20; yd <= 32; yd += 5){
    const yy = y(yd);
    if(yy < 4 || yy > H-2) continue;
    const isTen = (yd % 10 === 0);
    const stroke = isTen ? 'var(--fline10)' : 'var(--fline)';
    const sw = isTen ? 1.4 : 0.8;
    grid += `<line x1="${FL}" y1="${yy}" x2="${FR}" y2="${yy}" stroke="${stroke}" stroke-width="${sw}"/>`;
  }
  // Big rotated yard numbers at sidelines (every 10 yards)
  // LOS is treated as the 50; 10 yards downfield = 40, etc.
  const yardNumAt = yd => (50 - yd); // 0->50, 10->40, 20->30, 30->20
  let nums = '';
  for(const yd of [10, 20, 30]){
    const yy = y(yd);
    if(yy < 30) continue;
    const label = String(yardNumAt(yd));
    nums += `<text x="${FL+30}" y="${yy}" font-family="Oswald" font-weight="700" font-size="36" fill="var(--yard-num)" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90 ${FL+30} ${yy})">${label}</text>`;
    nums += `<text x="${FR-30}" y="${yy}" font-family="Oswald" font-weight="700" font-size="36" fill="var(--yard-num)" text-anchor="middle" dominant-baseline="middle" transform="rotate(90 ${FR-30} ${yy})">${label}</text>`;
    nums += `<polygon points="${FL+48},${yy-4} ${FL+48},${yy+4} ${FL+54},${yy}" fill="var(--yard-num)" opacity="0.7"/>`;
    nums += `<polygon points="${FR-48},${yy-4} ${FR-48},${yy+4} ${FR-54},${yy}" fill="var(--yard-num)" opacity="0.7"/>`;
  }
  // Hash marks: two rows of vertical ticks across the field at every yard
  let hashes = '';
  const hashL = FL + (FR-FL) * 0.33;
  const hashR = FL + (FR-FL) * 0.67;
  for(let yd = -20; yd <= 32; yd++){
    if(yd % 5 === 0) continue;
    const yy = y(yd);
    if(yy < 4 || yy > H-2) continue;
    hashes += `<line x1="${hashL-3}" y1="${yy}" x2="${hashL+3}" y2="${yy}" stroke="var(--hash)" stroke-width="1.2"/>`;
    hashes += `<line x1="${hashR-3}" y1="${yy}" x2="${hashR+3}" y2="${yy}" stroke="var(--hash)" stroke-width="1.2"/>`;
  }
  // Sideline boundary lines
  const sidelines = `<line x1="${FL}" y1="0" x2="${FL}" y2="${H}" stroke="var(--sideline)" stroke-width="2"/>`
    + `<line x1="${FR}" y1="0" x2="${FR}" y2="${H}" stroke="var(--sideline)" stroke-width="2"/>`;

  return `<svg class="field" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`
    + `<defs>
      <marker id="ah" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--ball)"/></marker>
      <marker id="ahp" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="var(--pull)"/></marker>
      <marker id="ahm" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--motion)"/></marker>
      <marker id="ahroute" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L14,7 L0,14 z" fill="var(--ball)"/></marker>
      <marker id="ahr" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="var(--d)"/></marker>
      <marker id="ahb" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 z" fill="var(--block)"/></marker>
      <marker id="mini-ah" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 z" fill="var(--gold)"/></marker>
    </defs>`
    + bands
    + grid
    + hashes
    + nums
    + sidelines
    + `<line x1="${FL}" y1="${LOS}" x2="${FR}" y2="${LOS}" stroke="var(--los)" stroke-width="3" opacity="0.85"/>`
    + inner
    + `</svg>`;
}

function drawOL(){
  return olDot(OL.LT,'T') + olDot(OL.LG,'G') + olDot(OL.C,'C') + olDot(OL.RG,'G') + olDot(OL.RT,'T');
}

function drawSkill(positions, hidden, play){
  hidden = hidden || [];
  let s = '';
  const order = ['X','Z','H','Y','RB'];
  for(const k of order){
    if(hidden.includes(k)) continue;
    const p = positions[k]; if(!p) continue;
    if(p.online){
      s += `<line x1="${mx(p.x)}" y1="${p.y-11}" x2="${mx(p.x)}" y2="${LOS}" stroke="var(--fline10)" stroke-width="2"/>`;
    }
    s += skillDot(p.x, p.y, k, posColor(k), labelFor(k, play));
  }
  if(positions.QB) s += skillDot(positions.QB.x, positions.QB.y, 'QB', posColor('QB'), labelFor('QB', play) || 'Q');
  return s;
}

function drawDefense(defenseKey, readRole){
  const def = DEFENSES[defenseKey];
  if(!def || !def.positions) return '';
  let s = '';
  const readId = readRole && def.roles[readRole];
  for(const id in def.positions){
    const p = def.positions[id];
    s += defDot(p.x, p.y, p.l, readId === id, id);
  }
  return s;
}

function posColor(player){
  const colors = (DATA && DATA.settings && DATA.settings.colors) || {};
  return colors[player] || ({X:'#e03131',Z:'#f0760a',H:'#0ca678',Y:'#2b6cd4',RB:'#8746d1',QB:'#d9a013'})[player] || '#7d8ca0';
}

// Adjust the perimeter (skill-player) blocking of a RUN play to a formation it
// wasn't drawn in. OL / QB / ballcarrier / path assignments are kept; every
// other skill player gets a rule-based block from where he actually lines up:
//   outermost receiver each side -> stalk that side's corner
//   attached TE (on the LOS)     -> base the force backer on his side
//   slot                          -> playside: stalk SS · backside: cut off FS
//   extra back                    -> lead through the playside hole
function adaptPerimeter(assignments, skill, play){
  const pathKinds = ['carry','keep','motion','fake','lead','reverse','handoff'];
  const { left, right, backs } = classifyReceivers(skill);
  const skip = k => k === play.ballcarrier
    || (play.motion && play.motion.player === k)
    || (assignments[k] && pathKinds.includes(assignments[k].kind));
  for(const k of ['X','Z','H','Y','RB']){ if(!skill[k]) delete assignments[k]; }
  [[right,'R'],[left,'L']].forEach(([arr, side]) => {
    arr.forEach((k, i) => {
      if(skip(k)) return;
      const p = skill[k];
      if(i === 0){ assignments[k] = { kind:'stalk', target: side==='R' ? 'playside-corner' : 'backside-corner' }; return; }
      if(p.online){ assignments[k] = { kind:'block', target: side==='R' ? 'sam' : 'will' }; return; }
      assignments[k] = side==='R'
        ? { kind:'stalk',  target:'strong-safety' }
        : { kind:'cutoff', target:'free-safety' };
    });
  });
  backs.forEach(k => {
    if(skip(k)) return;
    assignments[k] = { kind:'lead', waypoints:[[MID+34, LOS+28],[OL.RT+18, LOS+4]] };
  });
}

// Render an entire play to SVG
function renderPlay(play, opts){
  opts = opts || {};
  const defenseKey = opts.defense || play.defenseDefault || '3-4';
  const variant = (play.variants && play.variants.length && opts.variantIdx != null)
    ? play.variants[opts.variantIdx] : null;
  // Assignment layering: base -> variant -> per-defense override. defAssign holds
  // front-specific blocking (e.g. vs a 4-3 the combos move to the 3-tech), so the
  // diagram stays correct when the defense toggles.
  const defAssign = (play.defAssign && play.defAssign[defenseKey]) || null;
  const assignments = { ...play.assignments, ...(variant ? variant.assignments : null), ...defAssign };
  const readRole = variant && variant.readRole != null ? variant.readRole : play.readRole;

  const formationKey = opts.formation || play.formation;
  const formation = getFormation(formationKey);
  const skill = formation.pos();
  // Viewing a run play in a different formation: re-derive perimeter blocking
  if(opts.formation && opts.formation !== play.formation && play.type !== 'pass'){
    adaptPerimeter(assignments, skill, play);
  }

  // Apply motion: motion man's effective post-snap position becomes the motion endpoint
  const motion = computeMotion(play, skill);
  const motionStart = (motion && play.motion && skill[play.motion.player])
    ? { x: skill[play.motion.player].x, y: skill[play.motion.player].y }
    : null;
  if(motion && play.motion && skill[play.motion.player]){
    skill[play.motion.player] = { ...skill[play.motion.player], x: motion.endX, y: motion.endY };
  }

  // Build position lookup: skill + OL
  function pos(id){
    if(id === 'LT' || id === 'LG' || id === 'C' || id === 'RG' || id === 'RT'){
      return { x: OL[id], y: OLy };
    }
    return skill[id];
  }

  // Helper to render one assignment
  function renderAssignment(player, a){
    if(!a) return '';
    const p = pos(player); if(!p) return '';
    switch(a.kind){
      case 'block': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        return blockLine(p.x, p.y, t.x, t.y+8);
      }
      case 'combo': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        const partner = a.with && pos(a.with);
        if(!partner) return blockLine(p.x, p.y, t.x, t.y+8);
        const climbT = a.climbTo && resolveDefender(a.climbTo, defenseKey);
        return comboBlock(p.x, partner.x, t.x, t.y, climbT && climbT.x, climbT && climbT.y, player, a.with);
      }
      case 'scoop': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        const climbT = a.climbTo && resolveDefender(a.climbTo, defenseKey);
        return scoopBlock(p.x, t.x, t.y, climbT && climbT.x, climbT && climbT.y, player);
      }
      case 'reach': {
        // Zone reach, drawn covered/uncovered against the actual front:
        // a lineman whose nearest down lineman is over him arcs to that man's
        // playside shoulder; an uncovered lineman climbs flat to the nearest
        // playside linebacker (dashed, like a combo climb).
        const dir = a.direction === 'L' ? -1 : 1;
        const def = DEFENSES[defenseKey];
        const dls = [], lbs = [];
        if(def && def.positions){
          for(const id in def.positions){
            const d = def.positions[id];
            if(d.y >= LOS-40) dls.push(d);
            else if(d.y >= LOS-85) lbs.push(d);
          }
        }
        const olXs = [OL.LT, OL.LG, OL.C, OL.RG, OL.RT];
        let target = null;
        for(const d of dls){
          const nearestOl = olXs.reduce((b,x)=>Math.abs(x-d.x)<Math.abs(b-d.x)?x:b, olXs[0]);
          if(nearestOl !== p.x) continue;
          if(!target || Math.abs(d.x-p.x) < Math.abs(target.x-p.x)) target = d;
        }
        if(target){
          const ex = target.x+dir*13, ey = target.y+9;
          return P(`M ${p.x} ${OLy-12} Q ${p.x+dir*22} ${LOS-4} ${ex} ${ey}`, 'var(--block)', null, 'none')
            + capAt(p.x+dir*22, LOS-4, ex, ey);
        }
        let lb = null;
        for(const d of lbs){
          const dx = (d.x - p.x) * dir;
          if(dx >= -18 && (!lb || Math.abs(d.x-p.x) < Math.abs(lb.x-p.x))) lb = d;
        }
        if(lb){
          return P(`M ${p.x} ${OLy-12} Q ${p.x+dir*26} ${LOS-26} ${lb.x} ${lb.y+11}`, 'var(--block)', '5 3', 'none')
            + capAt(p.x+dir*26, LOS-26, lb.x, lb.y+11);
        }
        // No defense drawn — generic playside reach arc
        return P(`M ${p.x} ${OLy-12} Q ${p.x+26*dir} ${LOS-4} ${p.x+38*dir} ${LOS-22}`, 'var(--block)', null, 'none')
          + capAt(p.x+26*dir, LOS-4, p.x+38*dir, LOS-22);
      }
      case 'down': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        return blockLine(p.x, p.y, t.x, t.y+8);
      }
      case 'seal': {
        const dir = a.direction === 'R' ? 1 : -1;
        return P(`M ${p.x} ${OLy-12} Q ${p.x+22*dir} ${LOS-4} ${p.x+32*dir} ${LOS-22}`, 'var(--block)', null, 'none')
          + capAt(p.x+22*dir, LOS-4, p.x+32*dir, LOS-22);
      }
      case 'hinge': {
        const dir = a.direction === 'R' ? 1 : -1;
        return P(`M ${p.x} ${OLy-12} Q ${p.x+8*dir} ${LOS-4} ${p.x+16*dir} ${LOS-12}`, 'var(--block)', null, 'none')
          + capAt(p.x+8*dir, LOS-4, p.x+16*dir, LOS-12);
      }
      case 'pull':
      case 'trap': {
        if(!a.waypoints) return '';
        // Pulls start from the OL row top, not the OL dot center
        return pathWithTip({x:p.x, y:OLy-5}, a.waypoints, false, 'var(--pull)', '7 4', 2.8, 11);
      }
      case 'leave': {
        return '';
      }
      case 'carry': {
        if(!a.waypoints) return '';
        // Sharp polyline so the direction is unambiguous (no bulgy Bézier to mis-read).
        // Drawn thick in the ballcarrier's own color.
        return pathWithTip(p, a.waypoints, true, posColor(player), null, 4.5, 13);
      }
      case 'keep': {
        // Dashed path in the player's color — QB keep on a read, or option pitch man
        if(!a.waypoints) return '';
        return pathWithTip(p, a.waypoints, true, posColor(player), '6 4', 3, 11);
      }
      case 'handoff': {
        const r = pos(a.to); if(!r) return '';
        return ballMark((p.x+r.x)/2, (p.y+r.y)/2);
      }
      case 'lead': {
        // Lead block — travels, then finishes with the block cap
        if(!a.waypoints) return '';
        return pathWithCap(p, a.waypoints, false, 'var(--block)', '5 3', 2.6);
      }
      case 'fake':
      case 'motion': {
        if(!a.waypoints) return '';
        return pathWithTip(p, a.waypoints, false, 'var(--motion)', '6 4', 2.8, 10);
      }
      case 'reverse': {
        if(!a.waypoints) return '';
        return pathWithTip(p, a.waypoints, false, 'var(--d)', null, 2.8, 11);
      }
      case 'route': {
        const isRB = player === 'RB';
        const tree = isRB ? RB_ROUTES : RECEIVER_ROUTES;
        const fn = tree[a.tree];
        let wps;
        if(!fn){
          if(!a.waypoints) return '';
          wps = a.waypoints;
        } else {
          wps = fn(p.x, p.y, a.depth);
        }
        // Keep routes inside the field — never let one run off a sideline or
        // off the top edge (that's what made deep routes look like they cut
        // through the corner of the field).
        const clampPt = pt => [
          Math.max(FL+10, Math.min(FR-10, pt[0])),
          Math.max(26, pt[1])
        ];
        wps = wps.map(clampPt);
        // Smooth routes that arc by nature; rounded-corner polylines for break routes
        const SMOOTH_ROUTES = ['flat','wheel','texas'];
        const sharp = !SMOOTH_ROUTES.includes(a.tree);
        // Routes render in the player's own color so each is easy to trace
        return pathWithTip(p, wps, sharp, posColor(player), null, 3.4, 11);
      }
      case 'stalk': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        return stalkLocal(p.x, p.y, t.x, t.y);
      }
      case 'cutoff': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        // Cutoff runs all the way to the deep defender and caps on him
        return P(`M ${p.x} ${p.y} Q ${MID-20} ${LOS-30} ${t.x-8} ${t.y+18}`, 'var(--block)', '5 3', 'none')
          + capAt(MID-20, LOS-30, t.x-8, t.y+18);
      }
      case 'crack': {
        const t = a.target && resolveDefender(a.target, defenseKey);
        if(!t) return '';
        return P(`M ${p.x} ${p.y} Q ${t.x-4} ${LOS-16} ${t.x} ${t.y+8}`, 'var(--block)', '5 3', 'none')
          + capAt(t.x-4, LOS-16, t.x, t.y+8);
      }
      case 'pass-set': {
        // Protection faces the rush: short stem up from the lineman with the
        // block cap toward the defensive line
        return P(`M ${p.x} ${OLy-13} L ${p.x} ${OLy-24}`, 'var(--block)', null, 'none')
          + capAt(p.x, OLy-13, p.x, OLy-24);
      }
      case 'pass-block': {
        return P(`M ${p.x} ${p.y-13} L ${p.x} ${p.y-26}`, 'var(--block)', null, 'none')
          + capAt(p.x, p.y-13, p.x, p.y-26);
      }
      case 'release': {
        const dir = (p.x < MID) ? -1 : 1;
        return P(`M ${p.x} ${p.y} Q ${p.x+30*dir} ${p.y-15} ${p.x+60*dir} ${p.y-30}`, 'var(--ball)');
      }
      case 'dropback': {
        const steps = a.steps || 5;
        const depth = steps === 7 ? 36 : steps === 5 ? 24 : 14;
        if(a.type === 'rollout-R'){
          return P(`M ${p.x} ${p.y} Q ${p.x+30} ${p.y+10} ${p.x+60} ${p.y+depth/2}`, 'var(--block)', '3 4', 'ahb');
        }
        if(a.type === 'rollout-L'){
          return P(`M ${p.x} ${p.y} Q ${p.x-30} ${p.y+10} ${p.x-60} ${p.y+depth/2}`, 'var(--block)', '3 4', 'ahb');
        }
        return P(`M ${p.x} ${p.y} L ${p.x} ${p.y+depth}`, 'var(--block)', '3 4', 'ahb');
      }
    }
    return '';
  }

  // Compose layers
  let inner = '';
  inner += drawDefense(defenseKey, readRole);
  // Optional callouts (e.g. "trap →" near a specific defender) — a play can
  // provide per-front callouts (defCallouts) since the marked man differs by front
  const callouts = (play.defCallouts && play.defCallouts[defenseKey]) || play.callouts;
  if(callouts && Array.isArray(callouts)){
    for(const co of callouts){
      const d = co.anchor && resolveDefender(co.anchor, defenseKey);
      if(!d) continue;
      const tx = mx(d.x);
      const ty = d.y + (co.dy || -18);
      inner += `<text x="${tx}" y="${ty}" text-anchor="middle" font-family="Roboto Mono" font-weight="600" font-size="10" fill="var(--d)">${escapeHtml(co.text||'')}</text>`;
    }
  }
  inner += drawOL();
  // If there's a motion, render the motion path + start marker BEFORE skill players
  if(motion && motionStart){
    // Build a smooth path: M + Q for each waypoint pair (curved), L for single point
    const start = { x: mx(motionStart.x), y: motionStart.y };
    const wps = motion.waypoints.map(w => [mx(w[0]), w[1]]);
    let d = `M ${start.x} ${start.y}`;
    if(wps.length === 1){
      d += ` L ${wps[0][0]} ${wps[0][1]}`;
    } else {
      for(let i=0;i<wps.length-1;i++){
        d += ` Q ${wps[i][0]} ${wps[i][1]} ${wps[i+1][0]} ${wps[i+1][1]}`;
      }
    }
    inner += `<path class="anim-path anim-motion" d="${d}" fill="none" stroke="var(--motion)" stroke-width="3.6" stroke-dasharray="8 5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ahm)"/>`;
    // Bigger filled "M" start marker (no overlap with player dot below it)
    inner += `<circle cx="${start.x}" cy="${start.y}" r="11" fill="var(--motion)" stroke="var(--field)" stroke-width="2"/>`;
    inner += `<text x="${start.x}" y="${start.y+4}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="12" fill="#fff">M</text>`;
    // End-of-motion dot (where the player is at the snap)
    const endP = wps[wps.length-1];
    if(endP){
      inner += `<circle cx="${endP[0]}" cy="${endP[1]}" r="4" fill="var(--motion)" opacity="0.85"/>`;
    }
  }
  inner += drawSkill(skill, [], play);

  // Render assignments in deterministic order so motion shows first, blocks second, paths last
  const orderKinds = ['motion','fake','pass-set','block','combo','scoop','reach','down','seal','hinge','pull','trap','lead','stalk','cutoff','crack','route','pass-block','release','dropback','carry','keep','reverse','handoff','leave'];
  for(const k of orderKinds){
    for(const player in assignments){
      const a = assignments[player];
      if(a && a.kind === k) inner += renderAssignment(player, a);
    }
  }

  return renderFrame(inner);
}

// ============================================================
// DATA LAYER — localStorage, settings, import/export
// ============================================================
const STORAGE_KEY = 'playbook:v1';
let DATA;

function defaultSettings(){
  return {
    theme: 'light',  // light | dark | classic
    lineStyle: 'smooth',
    showYardLines: true,
    endCap: 'arrow',
    showDefenseByDefault: true,
    defaultDefense: '3-4',
    animSpeed: 1,
    // Saturated, distinct per-position colors — used for both the player dot
    // and that player's route/carry lines. Chosen to read on white AND dark fields.
    colors: { X:'#e03131', Z:'#f0760a', H:'#0ca678', Y:'#2b6cd4', RB:'#8746d1', QB:'#d9a013' },
    globalLabels: {},   // e.g. { H:"F", Y:"TE" } — overrides default position letters
  };
}

// Every play gets a unique wristband code (R-1, R-2… / P-1…). User-set codes
// are kept; only missing ones are assigned.
function ensurePlayCodes(){
  const used = new Set(DATA.plays.map(p => p.code).filter(Boolean));
  for(const p of DATA.plays){
    if(p.code) continue;
    const prefix = (p.type === 'pass' ? 'P' : 'R');
    let n = 1;
    while(used.has(prefix + '-' + n)) n++;
    p.code = prefix + '-' + n;
    used.add(p.code);
  }
}

// Count content changes since the last backup export (drives the backup nudge)
function markDirty(){
  DATA.savesSinceExport = (DATA.savesSinceExport || 0) + 1;
}

// Resolve display label for a player on a given play
function labelFor(id, play){
  const playL = (play && play.labels) || {};
  const globL = (DATA && DATA.settings && DATA.settings.globalLabels) || {};
  return playL[id] || globL[id] || id;
}

// Formation lookup with custom-formation fallback
function getFormation(id){
  if(FORMATIONS[id]) return FORMATIONS[id];
  if(DATA && DATA.formations){
    const c = DATA.formations.find(f => f.id === id);
    if(c){
      return {
        name: c.name,
        under: !!c.under,
        custom: true,
        pos: () => JSON.parse(JSON.stringify(c.skills || {})),
      };
    }
  }
  return FORMATIONS.spread;
}
function allFormations(){
  const out = Object.keys(FORMATIONS).map(k => [k, FORMATIONS[k].name]);
  if(DATA && DATA.formations){
    for(const f of DATA.formations) out.push([f.id, f.name + ' (custom)']);
  }
  return out;
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(!parsed.settings) parsed.settings = defaultSettings();
      else parsed.settings = {...defaultSettings(), ...parsed.settings};
      if(!parsed.plays) parsed.plays = [];
      return parsed;
    }
  } catch(e){ console.warn('Load failed', e); }
  return null;
}
function saveData(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
  catch(e){ console.warn('Save failed', e); }
}
function seedIfEmpty(){
  DATA = loadData();
  if(!DATA){
    DATA = { version:2, settings:defaultSettings(), plays:SEED_PLAYS.map(p=>({...p})), formations:[], routeTemplates:[] };
  } else {
    if(!DATA.plays || !DATA.plays.length) DATA.plays = SEED_PLAYS.map(p=>({...p}));
    if(!DATA.formations) DATA.formations = [];
    if(!DATA.routeTemplates) DATA.routeTemplates = [];
  }
  // One-time v2 migration: switch existing installs to the new light look + colors
  if((DATA.version || 1) < 2){
    DATA.version = 2;
    DATA.settings.theme = 'light';
    DATA.settings.colors = defaultSettings().colors;
  }
  // Keep seed plays in sync: add new seeds, refresh seeds the user hasn't
  // edited (never touch locked view-only imports)
  for(const seed of SEED_PLAYS){
    const idx = DATA.plays.findIndex(p => p.id === seed.id);
    if(idx < 0) DATA.plays.push({...seed});
    else if(!DATA.plays[idx].edited && !DATA.plays[idx].locked) DATA.plays[idx] = {...seed, code: DATA.plays[idx].code};
  }
  ensurePlayCodes();
  saveData();
}

function applyTheme(){
  document.documentElement.classList.remove('theme-dark','theme-classic','theme-light');
  if(DATA.settings.theme === 'dark') document.documentElement.classList.add('theme-dark');
  else if(DATA.settings.theme === 'classic') document.documentElement.classList.add('theme-classic');
  // 'light' = default :root palette, no class needed
}

function downloadJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}
function exportFullJSON(){
  DATA.savesSinceExport = 0;
  saveData();
  downloadJSON(DATA, 'playbook-backup.json');
}
// Merge a shared playbook payload into this coach's data. access:'view' locks
// the plays (view/print/duplicate only); 'edit' imports them fully editable.
function mergeSharedPlaybook(payload){
  const locked = payload.access === 'view';
  let added = 0;
  for(const play of (payload.plays || [])){
    const p = JSON.parse(JSON.stringify(play));
    while(DATA.plays.find(x => x.id === p.id)) p.id += '_x';
    p.locked = locked;
    p.edited = !locked;
    p.code = null;   // reassign so codes never collide with the local playbook
    DATA.plays.push(p); added++;
  }
  for(const f of (payload.formations || [])){
    if(!DATA.formations.find(x => x.id === f.id) && !FORMATIONS[f.id]) DATA.formations.push(f);
  }
  for(const r of (payload.routeTemplates || [])){
    if(!DATA.routeTemplates.find(x => x.id === r.id)) DATA.routeTemplates.push(r);
  }
  ensurePlayCodes(); markDirty(); saveData();
  return added;
}
function importFullJSON(file){
  const fr = new FileReader();
  fr.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed.plays) throw new Error('Missing plays array');
      if(parsed.access){
        // Shared-playbook file — merge, never wipe the local playbook
        const n = mergeSharedPlaybook(parsed);
        alert('Imported '+n+' shared play'+(n===1?'':'s')+' ('+(parsed.access==='view'?'view-only':'editable')+').');
      } else {
        if(!confirm('This is a full backup file. REPLACE your entire playbook with it? (Your current plays will be overwritten.)')) return;
        DATA.plays = parsed.plays;
        if(parsed.settings) DATA.settings = {...DATA.settings, ...parsed.settings};
        if(parsed.formations) DATA.formations = parsed.formations;
        if(parsed.routeTemplates) DATA.routeTemplates = parsed.routeTemplates;
        ensurePlayCodes(); saveData();
        alert('Restored '+parsed.plays.length+' plays.');
      }
      applyTheme(); renderCurrentTab();
    } catch(err){ alert('Import failed: '+err.message); }
  };
  fr.readAsText(file);
}

// ============================================================
// SHARE CODES — single-play base64
// ============================================================
function encodePlay(play){
  try { return 'PB1::' + btoa(unescape(encodeURIComponent(JSON.stringify(play)))); }
  catch(e){ return null; }
}
function decodeShareCode(code){
  if(!code || !code.startsWith('PB1::')) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(code.slice(5))))); }
  catch(e){ return null; }
}
// Whole-playbook share payload/code. access: 'view' (locked on import) or 'edit'.
function playbookPayload(access){
  return {
    v: 1,
    access: access === 'view' ? 'view' : 'edit',
    plays: DATA.plays.filter(p => !p.locked),   // never re-share someone else's view-only plays
    formations: DATA.formations || [],
    routeTemplates: DATA.routeTemplates || [],
  };
}
function encodePlaybook(access){
  try { return 'PBK1::' + btoa(unescape(encodeURIComponent(JSON.stringify(playbookPayload(access))))); }
  catch(e){ return null; }
}
function importShareCode(code){
  code = (code || '').trim();
  if(code.startsWith('PBK1::')){
    try {
      const payload = JSON.parse(decodeURIComponent(escape(atob(code.slice(6)))));
      const n = mergeSharedPlaybook(payload);
      alert('Imported '+n+' shared play'+(n===1?'':'s')+' ('+(payload.access==='view'?'view-only':'editable')+').');
      renderCurrentTab();
    } catch(e){ alert('Invalid playbook code.'); }
    return;
  }
  const play = decodeShareCode(code);
  if(!play){ alert('Invalid share code.'); return; }
  if(!play.id) play.id = 'imp_' + Date.now();
  // De-dupe id
  while(DATA.plays.find(p=>p.id === play.id)){ play.id = play.id + '_x'; }
  play.code = null; play.edited = true;
  DATA.plays.push(play);
  ensurePlayCodes(); markDirty(); saveData();
  alert('Imported "'+(play.name||'play')+'"');
  renderCurrentTab();
}
