function openSharePlaybookModal(){
  const old = document.getElementById('share-modal');
  if(old) old.remove();
  const hosted = location.protocol === 'http:' || location.protocol === 'https:';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.id = 'share-modal';
  modal.innerHTML = `
    <div class="modal-inner" style="max-width:580px;">
      <h3>Share Playbook</h3>
      <div class="lbl" style="margin-top:0;">Access for the coaches you share with</div>
      <div class="row">
        <button class="btn active" data-acc="view">View only</button>
        <button class="btn" data-acc="edit">View & edit</button>
      </div>
      <div id="share-desc" style="font-size:12.5px;color:var(--muted);margin:6px 0 10px;"></div>
      <textarea id="share-code-out" readonly style="min-height:88px;font-family:'Roboto Mono';font-size:10px;word-break:break-all;"></textarea>
      <div class="row" style="margin-top:10px;">
        <button class="btn primary" id="share-copy">Copy code</button>
        <button class="btn" id="share-file">Download share file</button>
        ${hosted ? '<button class="btn" id="share-link">Copy link</button>' : ''}
      </div>
      <div style="font-size:11.5px;color:var(--dim);margin-top:10px;">
        Coaches import with <b>Import Code</b> (paste the code) or <b>Import JSON</b> (the share file) on their Playbook tab.
        ${hosted ? 'The link imports automatically when they open it.' : 'Tip: host this file online (GitHub Pages, Netlify…) and a one-click share link appears here.'}
      </div>
      <div class="row" style="margin-top:12px;justify-content:flex-end;">
        <button class="btn" id="share-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  let access = 'view';
  const regen = () => {
    modal.querySelector('#share-code-out').value = encodePlaybook(access) || 'Failed to encode playbook.';
    modal.querySelector('#share-desc').textContent = access === 'view'
      ? 'View only: plays arrive locked — they can view, print, and duplicate copies, but never change your originals.'
      : 'View & edit: plays arrive as fully editable copies in their own playbook.';
  };
  modal.querySelectorAll('[data-acc]').forEach(b => b.onclick = () => {
    access = b.dataset.acc;
    modal.querySelectorAll('[data-acc]').forEach(x => x.classList.toggle('active', x === b));
    regen();
  });
  regen();
  modal.querySelector('#share-copy').onclick = () => {
    const code = modal.querySelector('#share-code-out').value;
    navigator.clipboard.writeText(code)
      .then(()=>alert('Playbook code copied — send it to your coaches.'))
      .catch(()=>{ modal.querySelector('#share-code-out').select(); document.execCommand('copy'); alert('Code selected — press Ctrl+C to copy.'); });
  };
  modal.querySelector('#share-file').onclick = () => {
    downloadJSON(playbookPayload(access), access === 'view' ? 'playbook-shared-view.json' : 'playbook-shared-edit.json');
  };
  const linkBtn = modal.querySelector('#share-link');
  if(linkBtn) linkBtn.onclick = () => {
    const url = location.origin + location.pathname + '#pb=' + encodeURIComponent(modal.querySelector('#share-code-out').value);
    navigator.clipboard.writeText(url).then(()=>alert('Share link copied.')).catch(()=>prompt('Copy this link:', url));
  };
  modal.querySelector('#share-close').onclick = () => modal.remove();
}

const viewerState = {
  playId: 'inside_zone',
  variantIdx: 0,
  direction: 'R',
  defense: null,    // null = use play default, else override
  formation: null,  // null = use play default, else formation key override
  showDefense: true,
  animating: false,
  animSpeed: 1,
};

function getViewerPlay(){
  return DATA.plays.find(p=>p.id === viewerState.playId) || DATA.plays[0];
}

function renderViewer(){
  const root = document.getElementById('viewer-tab');
  const play = getViewerPlay();
  if(!play){ root.innerHTML = '<p>No plays yet. Go to the Playbook tab and tap “+ New Play”.</p>'; return; }

  FLIP = viewerState.direction === 'L';
  const defenseKey = viewerState.showDefense
    ? (viewerState.defense || play.defenseDefault || DATA.settings.defaultDefense)
    : 'none';

  const q = (viewerState.search || '').toLowerCase();
  const matches = p => !q || (p.name||'').toLowerCase().includes(q)
    || (p.tag||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q);
  const playsByType = { run: [], pass: [] };
  DATA.plays.filter(matches).forEach(p => (playsByType[p.type||'run']||playsByType.run).push(p));

  const playList = type => playsByType[type].map(p =>
    `<button class="btn ${p.id===viewerState.playId?'active':''}" data-pick="${p.id}">${p.locked?'🔒 ':''}${escapeHtml(p.name)}</button>`

      + `</div>` : '';

  const motionPlayers = [];
  for(const k in play.assignments){
    if(play.assignments[k] && (play.assignments[k].kind === 'motion' || play.assignments[k].kind === 'fake')){
      motionPlayers.push(k);
    }
  }

  const tag = play.tag ? `<span class="tag ${play.type==='pass'?'pass':''}">${escapeHtml(play.tag)}</span>` : '';

  // Legality (getFormation also resolves user-built custom formations)
  const formationKey = viewerState.formation || play.formation;
  const formationOverridden = !!(viewerState.formation && viewerState.formation !== play.formation);
  const formation = getFormation(formationKey);
  const skill = formation.pos();
  const onLineSkill = ['X','Z','H','Y'].filter(k => skill[k] && skill[k].online);
  const onLineTotal = 5 + onLineSkill.length;
  const legalOk = onLineTotal >= 7;
  const eligible = ['X','Z','H','Y','RB'].filter(k => skill[k]).join(', ');

  const variant = (play.variants && play.variants.length && play.variants[viewerState.variantIdx]) ? play.variants[viewerState.variantIdx] : null;
  const rows = (variant && variant.rows) ? variant.rows : (play.rows || []);
  const note = (variant && variant.note) ? variant.note : (play.note || '');
  const youth = play.youthNote || '';

  // Receiver block rows appended
  const recRows = [
    ['WRs','Playside WR stalk-blocks the corner over him — mirror him, hands inside, wall him from the ball.'],
    ['Slot','Backside slot sprints to cut off the deep safety (the home-run block).'],
    ['Backside WR','Stalk the corner / cut off pursuit. Never run a route on a called run.'],

  const rowsHtml = rows.map(r => `<tr><td>${escapeHtml(r[0])}</td><td>${escapeHtml(r[1])}</td></tr>`).join('')

  root.innerHTML = `

      <input type="text" id="viewer-search" placeholder="Filter plays… (name, tag, code)" value="${escapeHtml(viewerState.search||'')}" style="min-width:230px;">

    ${playsByType.run.length ? `<div class="lbl">Run plays</div><div class="row">${playList('run')}</div>` : ''}
    ${playsByType.pass.length ? `<div class="lbl">Pass plays</div><div class="row">${playList('pass')}</div>` : ''}
    ${!playsByType.run.length && !playsByType.pass.length ? '<div class="lbl">No plays match your filter.</div>' : ''}
    ${variantTabs}
    <div class="lbl">Formation</div>
    <div class="row" style="align-items:center;">
      <select id="viewer-formation">
        <option value="">Play default (${escapeHtml(getFormation(play.formation).name)})</option>
        ${allFormations().map(([k,name])=>`<option value="${k}" ${viewerState.formation===k?'selected':''}>${escapeHtml(name)}</option>`).join('')}
      </select>
      ${formationOverridden && play.type!=='pass' ? `<span style="font-family:'Roboto Mono';font-size:10.5px;color:var(--accent);">perimeter blocking auto-adjusted to this formation</span>` : ''}
    </div>
    <div class="lbl">Direction</div>
    <div class="row">
      <button class="btn ${viewerState.direction==='R'?'active':''}" data-dir="R">Run Right ▶</button>
      <button class="btn ${viewerState.direction==='L'?'active':''}" data-dir="L">◀ Run Left</button>
    </div>
    <div class="lbl">Defense</div>
    <div class="row">
      <button class="btn ${viewerState.showDefense && (viewerState.defense||play.defenseDefault)==='3-4'?'active':''}" data-def="3-4">3-4</button>
      <button class="btn ${viewerState.showDefense && (viewerState.defense||play.defenseDefault)==='4-3'?'active':''}" data-def="4-3">4-3</button>
      <button class="btn ${!viewerState.showDefense?'active':''}" data-def="none">None</button>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="ln block"></span>Block</div>
      <div class="legend-item"><span class="ln pull"></span>Pull / Trap</div>
      <div class="legend-item"><span class="ln path"></span>Ballcarrier (player color)</div>
      <div class="legend-item"><span class="ln motion"></span>Motion / Fake</div>
      <div class="legend-item"><span class="ln route"></span>Route (player color)</div>
    </div>

    <div class="card">
      <div class="anim no-print">
        <button class="btn sm primary" id="anim-play">▶ Play</button>
        <button class="btn sm" id="anim-reset">Reset</button>
        <span class="speed">Speed</span>
        <input type="range" min="0.25" max="2" step="0.25" value="${viewerState.animSpeed}" id="anim-speed">
        <span class="speed" id="anim-speed-val">${viewerState.animSpeed}×</span>
        <span style="flex:1;"></span>
        ${play.locked ? '<span class="speed">🔒 View-only (shared)</span>' : '<button class="btn sm" id="viewer-edit">✎ Edit Play</button>'}
        <button class="btn sm" id="viewer-dup">⧉ Duplicate</button>
      </div>
      <div class="ph">
        <div class="pn">${escapeHtml(formation.name)} · ${escapeHtml(play.name)}${variant ? ' · ' + escapeHtml(variant.label) : ''}${tag}</div>
        <div class="pdesc">${escapeHtml(play.desc||'')}</div>
        <div style="font-family:'Roboto Mono';font-size:11px;margin-top:8px;color:${legalOk?'var(--motion)':'var(--accent)'};">
          On the line: ${onLineTotal} ${legalOk?'✓ legal':'⚠ need 7'} &nbsp;·&nbsp; Eligible: ${eligible}
        </div>
      </div>
      <div id="viewer-svg-wrap">${renderPlay(play, {defense:defenseKey, variantIdx:viewerState.variantIdx, formation:viewerState.formation})}</div>
      <div class="assign">
        <h3>Assignments</h3>
        <table><tbody>${rowsHtml}</tbody></table>
        ${note ? `<div class="note">${escapeHtml(note)}</div>` : ''}
        ${youth ? `<div class="youth">${youth}</div>` : ''}

    </div>
  `;

  // Wire up
  root.querySelectorAll('[data-pick]').forEach(b => b.onclick = () => {
    viewerState.playId = b.dataset.pick; viewerState.variantIdx = 0; viewerState.formation = null; renderViewer();

  const vsearch = document.getElementById('viewer-search');
  vsearch.oninput = () => {

  root.querySelectorAll('[data-dir]').forEach(b => b.onclick = () => {

  root.querySelectorAll('[data-def]').forEach(b => b.onclick = () => {

  document.getElementById('anim-play').onclick = () => playAnimation();
  document.getElementById('anim-reset').onclick = () => { renderViewer(); };

    viewerState.playId = copy.id;
    renderViewer();
  };
  const speed = document.getElementById('anim-speed');

  };
}

// ============================================================
// ANIMATION — stroke-dashoffset based playback
// ============================================================
let animState = { running:false, raf:null };

function playAnimation(){
  const wrap = document.getElementById('viewer-svg-wrap');
  if(!wrap) return;
  const paths = wrap.querySelectorAll('.anim-path');
  if(!paths.length) return;
  // Reset all paths
  paths.forEach(p => {
    try{
      const len = p.getTotalLength ? p.getTotalLength() : 200;
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.dataset.len = len;
    } catch(e){}
  });
  // Force reflow
  void wrap.offsetWidth;
  const duration = 2000 / viewerState.animSpeed;
  paths.forEach(p => {
    p.style.transition = `stroke-dashoffset ${duration}ms ease-out`;
    p.style.strokeDashoffset = 0;
  });
}

// ============================================================
// ROUTE TREE — visual numbered tree + per-route preview
// ============================================================

// Compact route shapes for the tree/card visualizations. `side` is 'L' or 'R'
// (which side of the field the receiver is on). `s` scales the whole shape so
// the same routes fit a big tree (s=1) or a small card (s<1) without clamping.
function routeShapeMini(key, sx, sy, side, s=1){
  const raw = routeShapeRaw(key, sx, sy, side);
  if(s === 1) return raw;
  return raw.map(p => [sx + (p[0]-sx)*s, sy + (p[1]-sy)*s]);
}
function routeShapeRaw(key, sx, sy, side){
  const inDir = side === 'L' ? 1 : -1;   // toward the middle
  const outDir = -inDir;                  // toward the sideline
  switch(key){
    case 'go':        return [[sx, sy - 160]];
    case 'hitch':     return [[sx, sy - 55], [sx + inDir*10, sy - 46]];
    case 'slant':     return [[sx, sy - 26], [sx + inDir*105, sy - 62]];
    case 'out':       return [[sx, sy - 85], [sx + outDir*65, sy - 85]];
    case 'dig':       return [[sx, sy - 105], [sx + inDir*95, sy - 105]];
    case 'post':      return [[sx, sy - 95], [sx + inDir*60, sy - 170]];
    case 'corner':    return [[sx, sy - 95], [sx + outDir*60, sy - 170]];
    case 'flat':      return [[sx + outDir*20, sy - 10], [sx + outDir*70, sy - 26]];
    case 'quick_out': return [[sx, sy - 35], [sx + outDir*65, sy - 35]];
    case 'screen':    return [[sx + inDir*22, sy + 16], [sx + inDir*66, sy + 4]];
    case 'now':       return [[sx + inDir*18, sy + 14], [sx + inDir*46, sy + 6]];
    case 'comeback':  return [[sx, sy - 105], [sx + outDir*22, sy - 86]];
    case 'curl':      return [[sx, sy - 105], [sx + inDir*22, sy - 86]];
    case 'drag':      return [[sx + inDir*18, sy - 40], [sx + inDir*150, sy - 46]];
  }
  return [];
}

// Render a single route as an SVG path string from (sx,sy)
function routeMiniPath(key, sx, sy, side){
  const wps = routeShapeMini(key, sx, sy, side);
  if(!wps.length) return '';
  return roundedPathD([[sx, sy], ...wps], 10);
}

// A small football icon (brown, with laces) used as a "the ball is here / QB side"
// reference on route previews. (cx,cy) = center, r = horizontal radius.
function ballSVG(cx, cy, r=8){
  const ry = r*0.62;
  return `<g transform="rotate(26 ${cx} ${cy})">
    <ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="${ry}" fill="#9c4a23" stroke="#6f3416" stroke-width="1"/>
    <line x1="${cx-r*0.5}" y1="${cy}" x2="${cx+r*0.5}" y2="${cy}" stroke="#f4f4ee" stroke-width="1.1"/>
    <line x1="${cx-r*0.22}" y1="${cy-ry*0.5}" x2="${cx-r*0.22}" y2="${cy+ry*0.5}" stroke="#f4f4ee" stroke-width="1"/>
    <line x1="${cx}" y1="${cy-ry*0.6}" x2="${cx}" y2="${cy+ry*0.6}" stroke="#f4f4ee" stroke-width="1"/>
    <line x1="${cx+r*0.22}" y1="${cy-ry*0.5}" x2="${cx+r*0.22}" y2="${cy+ry*0.5}" stroke="#f4f4ee" stroke-width="1"/>
  </g>`;
}

// Tiny SVG card preview for one route (used in route cards and editor picker).
// Marker ID is unique per card so duplicates on the page don't fight.
function routeCardSVG(key, side='R'){
  const vw = 160, vh = 132;
  // Receiver sits bottom-center (PlayMakerX style) so routes have room both ways
  // and a vertical Go runs cleanly up the middle instead of into a corner.
  const sx = vw / 2;
  const sy = vh - 16;
  const losY = sy + 6;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const wps = routeShapeMini(key, sx, sy, side, 0.58)
    .map(p => [clamp(p[0], 10, vw-10), clamp(p[1], 12, vh-10)]);
  const d = roundedPathD([[sx, sy], ...wps], 8);
  // Ball sits at the LOS on the inside of the receiver (toward the QB / midfield)
  const inDir = side === 'L' ? 1 : -1;
  const ballX = sx + inDir * 30;
  const mid = 'rcap_' + key + '_' + side + '_' + Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 ${vw} ${vh}" style="width:100%;height:auto;">
    <defs><marker id="${mid}" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--gold)"/></marker></defs>
    <line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border)" stroke-width="1"/>
    <path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#${mid})"/>
    ${ballSVG(ballX, sy, 8)}
    <circle cx="${sx}" cy="${sy}" r="6" fill="var(--field)" stroke="var(--gold)" stroke-width="1.8"/>
  </svg>`;
}

// The big numbered tree — receiver with all 12 routes radiating, each labeled with its number
function routeTreeMiniSVG(side){
  const vw = 400, vh = 320;
  const sx = side === 'L' ? 110 : vw - 110;
  const sy = vh - 30;
  const losY = sy + 6;
  let s = `<svg viewBox="0 0 ${vw} ${vh}" style="width:100%;height:auto;">
    <defs><marker id="rcap2" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="var(--motion)"/></marker></defs>
    <line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border-strong)" stroke-width="1.5"/>`;
  for(const r of ROUTE_TREE_NUMBERS){
    const wps = routeShapeMini(r.key, sx, sy, side);
    if(!wps.length) continue;
    const d = roundedPathD([[sx, sy], ...wps], 10);
    s += `<path d="${d}" fill="none" stroke="var(--motion)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#rcap2)" data-route="${r.key}" style="cursor:pointer;" class="tree-route"/>`;
    // Number label at endpoint
    const end = wps[wps.length-1];
    s += `<text x="${end[0]}" y="${end[1] - 4}" font-family="Oswald" font-weight="700" font-size="16" fill="var(--motion)" text-anchor="middle" pointer-events="none">${r.num}</text>`;
  }
  // Ball at the LOS on the inside of the receiver (toward midfield / the QB)
  const ballX = side === 'L' ? sx + 40 : sx - 40;
  s += ballSVG(ballX, sy, 11);
  s += `<circle cx="${sx}" cy="${sy}" r="9" fill="var(--field)" stroke="var(--motion)" stroke-width="2"/>`;
  s += `</svg>`;
  return s;
}

// All available route templates (built-in + user-created)
function allRouteTemplates(){
  const built = ROUTE_TREE_NUMBERS.map(r => ({ id: r.key, name: r.label, num: r.num, key: r.key, builtIn: true }));
  const custom = (DATA.routeTemplates || []).map(r => ({ ...r, builtIn: false }));
  return [...built, ...custom];
}

        <option value="">All Tags</option>

  document.getElementById('tag-filter').onchange = e => { libState.filterTag = e.target.value; renderLibrary(); };

    editorState.editingId = null;
    editorState.draft = blankPlay();
    activateTab('build');
  };
  document.getElementById('share-playbook').onclick = openSharePlaybookModal;
  const backupNow = document.getElementById('backup-now');
  if(backupNow) backupNow.onclick = () => { exportFullJSON(); renderLibrary(); };
  document.getElementById('import-share').onclick = () => {
    const c = prompt('Paste a share code (a play: PB1:: — or a whole playbook: PBK1::):');
    if(c) importShareCode(c);
  };
  document.getElementById('export-all').onclick = () => { exportFullJSON(); renderLibrary(); };
  document.getElementById('import-all').onchange = e => { if(e.target.files[0]) importFullJSON(e.target.files[0]); };

  document.getElementById('print-callsheet').onclick = () => printCallSheet(plays);

      const id = b.dataset.id, act = b.dataset.act;

      if(!play) return;
      if(act === 'view'){ viewerState.playId = id; activateTab('viewer'); }
      else if(act === 'edit'){ editorState.editingId = id; editorState.draft = JSON.parse(JSON.stringify(play)); activateTab('editor'); }

          prompt('Copy this share code:', code);

      }
      else if(act === 'print'){ printPracticeCard(play); }
    };
  });
}

        <div class="route-card" data-rtemplate="${escapeHtml(t.id)}" data-builtin="${t.builtIn?'1':'0'}">
          ${t.num != null ? `<div class="route-card-num">${t.num}</div>` : ''}
          ${t.builtIn ? routeCardSVG(t.key, 'R') : customRouteCardSVG(t)}
          <div class="route-card-name">${escapeHtml(t.name)}</div>
          ${!t.builtIn ? `<button class="route-card-del" data-rdel="${escapeHtml(t.id)}">×</button>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}
function wireRoutesView(root){
  root = root || document.getElementById('templates-tab');
  const newBtn = root.querySelector('[data-newroute]');
  if(newBtn) newBtn.onclick = () => openCustomRouteBuilder(null);
  root.querySelectorAll('[data-rdel]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = b.dataset.rdel;
      if(confirm('Delete this route template?')){
        DATA.routeTemplates = DATA.routeTemplates.filter(r => r.id !== id);
        saveData(); renderTemplates();
      }
    };
  });
  root.querySelectorAll('[data-rtemplate]').forEach(card => {
    card.onclick = () => {
      const id = card.dataset.rtemplate;
      const builtIn = card.dataset.builtin === '1';
      if(!builtIn){
        const t = DATA.routeTemplates.find(r => r.id === id);
        if(t) openCustomRouteBuilder(id);
      }
    };
  });
}

// Builder canvas origin (where the receiver dot sits while drawing). Custom
// route waypoints are stored in this 320x240 space, so the card preview and the
// on-field placement both translate relative to this origin.
const CRB_ORIGIN = { x: 270, y: 220 };
function customRouteCardSVG(template){
  const vw = 160, vh = 130;
  const sx = vw - 40, sy = vh - 18;
  const losY = sy + 6;
  const ballX = sx - 30;
  const SCALE = 0.5;  // builder space -> card space
  const toCard = wp => [sx + (wp[0]-CRB_ORIGIN.x)*SCALE, sy + (wp[1]-CRB_ORIGIN.y)*SCALE];
  if(!template.waypoints || !template.waypoints.length){
    return `<svg viewBox="0 0 ${vw} ${vh}"><line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border)" stroke-width="1"/>${ballSVG(ballX, sy, 8)}<circle cx="${sx}" cy="${sy}" r="6" fill="var(--field)" stroke="var(--ball)" stroke-width="1.8"/></svg>`;
  }
  const d = roundedPathD([[sx, sy], ...template.waypoints.map(toCard)], 8);
  return `<svg viewBox="0 0 ${vw} ${vh}">
    <defs><marker id="rcap_c" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--gold)"/></marker></defs>
    <line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border)" stroke-width="1"/>
    <path d="${d}" fill="none" stroke="var(--ball)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#rcap_c)"/>
    ${ballSVG(ballX, sy, 8)}
    <circle cx="${sx}" cy="${sy}" r="6" fill="var(--field)" stroke="var(--ball)" stroke-width="1.8"/>
  </svg>`;
}

// CUSTOM ROUTE BUILDER (modal)
// ============================================================
const crbState = { editing:null, draft:null };
function openCustomRouteBuilder(id){
  if(id){
    const t = DATA.routeTemplates.find(r => r.id === id);
    if(!t){ alert('Route not found'); return; }
    crbState.editing = id;
    crbState.draft = JSON.parse(JSON.stringify(t));
  } else {
    crbState.editing = null;
    crbState.draft = { id: 'r_' + Date.now(), name: 'New Route', waypoints: [] };
  }
  renderCustomRouteBuilder();
}
function renderCustomRouteBuilder(){
  const t = crbState.draft;
  const vw = 320, vh = 240;
  const sx = vw - 50, sy = vh - 20;
  const losY = sy + 6;
  const d = roundedPathD([[sx, sy], ...t.waypoints], 10);
  let handles = '';
  t.waypoints.forEach((p,i) => {
    handles += `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="var(--accent)" stroke="var(--field)" stroke-width="1.5" class="crb-handle" data-i="${i}" style="cursor:pointer;"/>`;
  });
  const old = document.getElementById('crb-modal');
  if(old) old.remove();
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.id = 'crb-modal';
  modal.innerHTML = `
    <div class="modal-inner" style="max-width:520px;">
      <h3>${crbState.editing ? 'Edit' : 'New'} Route Template</h3>
      <div class="row" style="margin-bottom:10px;">
        <input type="text" id="crb-name" value="${escapeHtml(t.name)}" placeholder="Route name" style="flex:1;">
      </div>
      <div style="font-family:'Roboto Mono';font-size:11px;color:var(--muted);margin-bottom:6px;">
        Click on the field to add waypoints. Click a handle to remove it. ${t.waypoints.length} waypoint(s).
      </div>
      <svg viewBox="0 0 ${vw} ${vh}" id="crb-svg" style="width:100%;background:var(--field);border:1px solid var(--border);border-radius:8px;cursor:crosshair;">
        <defs><marker id="rcap_b" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--gold)"/></marker></defs>
        <line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border-strong)" stroke-width="1.5"/>
        <path d="${d}" fill="none" stroke="var(--ball)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#rcap_b)"/>
        ${ballSVG(sx - 38, sy, 10)}
        <circle cx="${sx}" cy="${sy}" r="9" fill="var(--field)" stroke="var(--ball)" stroke-width="2"/>
        ${handles}
      </svg>
      <div class="row" style="margin-top:14px;justify-content:space-between;">
        <button class="btn" id="crb-clear">Clear all</button>
        <div>
          <button class="btn" id="crb-cancel">Cancel</button>
          <button class="btn primary" id="crb-save">Save</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const svg = modal.querySelector('#crb-svg');
  svg.addEventListener('click', e => {
    if(e.target.classList && e.target.classList.contains('crb-handle')){
      const i = +e.target.dataset.i;
      t.waypoints.splice(i, 1);
      renderCustomRouteBuilder();
      return;
    }
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const c = pt.matrixTransform(svg.getScreenCTM().inverse());
    t.waypoints.push([Math.round(c.x), Math.round(c.y)]);
    renderCustomRouteBuilder();
  });
  modal.querySelector('#crb-name').oninput = e => { t.name = e.target.value; };
  modal.querySelector('#crb-clear').onclick = () => { t.waypoints = []; renderCustomRouteBuilder(); };
  modal.querySelector('#crb-cancel').onclick = () => modal.remove();
  modal.querySelector('#crb-save').onclick = () => {
    if(!t.waypoints.length){ alert('Add at least one waypoint'); return; }
    // Inline flow: drawing a one-off route for a specific player in the editor
    if(crbState._inlineFor){
      const player = crbState._inlineFor;
      assignRouteFromTemplate(player, { builtIn:false, template: t });
      crbState._inlineFor = null;
      modal.remove();
      return;
    }
    if(!t.name || !t.name.trim()){ alert('Name required'); return; }
    DATA.routeTemplates = DATA.routeTemplates || [];
    if(crbState.editing){
      const idx = DATA.routeTemplates.findIndex(r => r.id === crbState.editing);
      if(idx >= 0) DATA.routeTemplates[idx] = t;
    } else {
      while(DATA.routeTemplates.find(r => r.id === t.id)) t.id += '_x';
      DATA.routeTemplates.push(t);
    }
    saveData();
    modal.remove();
    if(currentTab === 'templates') renderTemplates();
  };
}

function renderEditor(){
  const root = document.getElementById('editor-tab');

  FLIP = false;  // editor always shows right-handed; flip applied at view time

    <div class="editor-wrap">

        ${editorFieldSVG(d)}
      </div>
      <div class="editor-side">

// EDITOR FIELD — render + interaction wiring (shared by full
// re-renders and live waypoint dragging)
// ============================================================
const WP_EDIT_KINDS = ['pull','trap','carry','motion','fake','lead','reverse','keep','route'];

function editorFieldSVG(d){
  FLIP = false;
  // The editor edits the base play — per-front overrides layer on in the viewer
  const rd = {...d}; delete rd.defAssign; delete rd.defCallouts;
  return renderPlay(rd, {defense:d.defenseDefault}).replace('</svg>', editorHandlesSVG(d) + '</svg>');
}

// Green drag handles on every editable waypoint (paths + custom routes + motion)
function editorHandlesSVG(d){
  let s = '';
  const add = (wps, key) => (wps || []).forEach((wp, i) => {
    s += `<circle class="wp-handle" data-wpl="${key}" data-wpi="${i}" cx="${wp[0]}" cy="${wp[1]}" r="6.5" fill="var(--accent)" stroke="#fff" stroke-width="1.7"><title>Drag to move · double-click to delete</title></circle>`;
  });
  for(const player in d.assignments){
    const a = d.assignments[player];
    if(a && a.waypoints && WP_EDIT_KINDS.includes(a.kind)) add(a.waypoints, player);
  }
  if(d.motion && d.motion.waypoints) add(d.motion.waypoints, '__motion');
  return s;
}

function wireEditorField(){
  const d = editorState.draft;
  const field = document.getElementById('editor-field');
  if(!field || !d) return;
  field.querySelectorAll('[data-player]').forEach(el => {
    el.classList.add('player-clickable');
    el.onclick = (e) => openPlayerPopover(el.getAttribute('data-player'), e);
  });
  field.querySelectorAll('[data-role]').forEach(el => {
    el.classList.add('def-clickable');
    el.onclick = () => {
      if(editorState.drawMode === 'target' && editorState.drawingFor){
        const role = el.getAttribute('data-role');
        const def = DEFENSES[d.defenseDefault];
        const roleName = Object.keys(def.roles).find(r => def.roles[r] === role) || role;
        const a = d.assignments[editorState.drawingFor.player] || {};
        a.target = roleName;
        d.assignments[editorState.drawingFor.player] = a;
        editorState.drawMode = null; editorState.drawingFor = null;
        renderEditor();
      }
    };
  });
  // Click on empty field area = add waypoint (if in path-draw mode)
  field.querySelector('svg.field').onclick = (e) => {
    if(!editorState.drawingFor) return;
    if(e.target.classList && e.target.classList.contains('wp-handle')) return;
    const svg = e.currentTarget;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    const coords = [Math.round(cursorPt.x), Math.round(cursorPt.y)];
    if(editorState.drawMode === 'waypoint'){
      const a = d.assignments[editorState.drawingFor.player] || { kind: editorState.drawingFor.kind, waypoints: [] };
      if(!a.waypoints) a.waypoints = [];
      a.waypoints.push(coords);
      d.assignments[editorState.drawingFor.player] = a;
      renderEditor();
    } else if(editorState.drawMode === 'motion-waypoint'){
      d.motion = d.motion || {};
      d.motion.waypoints = d.motion.waypoints || [];
      d.motion.waypoints.push(coords);
      renderEditor();
    }
  };
  // Waypoint drag handles
  field.querySelectorAll('.wp-handle').forEach(h => {
    const start = e => {
      editorState.wpDrag = { key: h.getAttribute('data-wpl'), i: +h.getAttribute('data-wpi') };
      e.preventDefault(); e.stopPropagation();
    };
    h.addEventListener('mousedown', start);
    h.addEventListener('touchstart', start, {passive:false});
    h.addEventListener('dblclick', e => {
      e.stopPropagation();
      const key = h.getAttribute('data-wpl'), i = +h.getAttribute('data-wpi');
      const arr = key === '__motion' ? (d.motion && d.motion.waypoints) : (d.assignments[key] && d.assignments[key].waypoints);
      if(arr){ arr.splice(i, 1); renderEditor(); }
    });
  });
}

// Live field-only refresh during a drag (full renderEditor would drop the drag)
function refreshEditorField(){
  const field = document.getElementById('editor-field');
  const d = editorState.draft;
  if(!field || !d) return;
  field.innerHTML = editorFieldSVG(d);
  wireEditorField();
}

function wpDragMove(cx, cy){
  if(!editorState.wpDrag) return;
  const d = editorState.draft;
  const field = document.getElementById('editor-field');
  const fsvg = field && field.querySelector('svg.field');
  if(!fsvg || !d){ editorState.wpDrag = null; return; }
  const pt = fsvg.createSVGPoint(); pt.x = cx; pt.y = cy;
  const c = pt.matrixTransform(fsvg.getScreenCTM().inverse());
  const k = editorState.wpDrag.key;
  const arr = k === '__motion' ? (d.motion && d.motion.waypoints) : (d.assignments[k] && d.assignments[k].waypoints);
  if(!arr || !arr[editorState.wpDrag.i]) return;
  arr[editorState.wpDrag.i] = [Math.round(c.x), Math.round(c.y)];
  refreshEditorField();
}
document.addEventListener('mousemove', e => { if(editorState.wpDrag) wpDragMove(e.clientX, e.clientY); });
document.addEventListener('mouseup', () => { if(editorState.wpDrag){ editorState.wpDrag = null; renderEditor(); } });
document.addEventListener('touchmove', e => { if(editorState.wpDrag && e.touches[0]){ wpDragMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, {passive:false});
document.addEventListener('touchend', () => { if(editorState.wpDrag){ editorState.wpDrag = null; renderEditor(); } });
// Esc finishes any drawing/targeting mode
document.addEventListener('keydown', e => {

    editorState.drawMode = null; editorState.drawingFor = null;

});

const ALL_KINDS = {
  OL:   ['block','combo','scoop','reach','down','seal','hinge','pull','trap','pass-set','leave'],
  back: ['carry','lead','route','pass-block','release','motion','fake'],
  qb:   ['handoff','carry','dropback','fake','motion'],
  rec:  ['route','stalk','crack','motion','fake','cutoff'],
};
function kindOptions(player, current){
  let kinds;
  if(['LT','LG','C','RG','RT'].includes(player)) kinds = ALL_KINDS.OL;
  else if(player === 'QB') kinds = ALL_KINDS.qb;
  else if(player === 'RB' || player === 'Y') kinds = [...ALL_KINDS.back, ...ALL_KINDS.rec];
  else kinds = ALL_KINDS.rec;
  return `<option value="">— pick —</option>` + kinds.map(k=>`<option value="${k}" ${k===current?'selected':''}>${k}</option>`).join('');
}

function renderAsgnControls(player, a){
  const defKey = editorState.draft.defenseDefault;
  const def = DEFENSES[defKey];
  const roleOptions = def && def.roles ? Object.keys(def.roles) : [];
  let s = '';
  // Targeted (block, stalk, etc.) — scoop also picks a target
  if(['block','combo','scoop','down','stalk','cutoff','crack'].includes(a.kind)){
    s += `<select data-target="${player}" style="width:120px;">`
      + `<option value="">— target —</option>`
      + roleOptions.map(r=>`<option value="${r}" ${a.target===r?'selected':''}>${r}</option>`).join('')
      + `</select>`;
    s += `<button class="btn sm" data-pick-target="${player}">tap</button>`;
  }
  // Combo extras
  if(a.kind === 'combo'){
    const others = ['LT','LG','C','RG','RT'].filter(p=>p!==player);
    s += `<select data-with="${player}" style="width:60px;"><option value="">with</option>${others.map(o=>`<option value="${o}" ${a.with===o?'selected':''}>${o}</option>`).join('')}</select>`;
    s += `<select data-climb="${player}" style="width:90px;"><option value="">climb…</option>${roleOptions.map(r=>`<option value="${r}" ${a.climbTo===r?'selected':''}>${r}</option>`).join('')}</select>`;
  }
  // Scoop extras (target picked above; just need climbTo)
  if(a.kind === 'scoop'){
    s += `<select data-climb="${player}" style="width:90px;"><option value="">climb…</option>${roleOptions.map(r=>`<option value="${r}" ${a.climbTo===r?'selected':''}>${r}</option>`).join('')}</select>`;
  }
  // Route
  if(a.kind === 'route'){
    // Only the RB uses the backfield route set — must match the renderer,
    // which draws Y (TE/slot) from the receiver tree.
    const isRB = player === 'RB';
    const tree = isRB ? RB_ROUTES : RECEIVER_ROUTES;
    s += `<select data-tree="${player}" style="width:80px;">${Object.keys(tree).map(t=>`<option value="${t}" ${a.tree===t?'selected':''}>${t}</option>`).join('')}</select>`;
    s += `<input type="number" data-depth-input="${player}" value="${a.depth||''}" placeholder="depth" min="0" max="30" style="width:50px;">`;
    s += `<button class="btn sm" data-depth-set="${player}">Set</button>`;
    s += `<button class="btn sm" data-route-pick="${player}">Tree</button>`;
    s += `<button class="btn sm" data-route-draw="${player}">Draw</button>`;
  }
  // Path-based
  if(['pull','trap','carry','motion','fake','lead','reverse'].includes(a.kind)){
    const wp = (a.waypoints || []);
    if(editorState.drawMode === 'waypoint' && editorState.drawingFor && editorState.drawingFor.player === player){
      s += `<span style="color:var(--accent);">drawing… ${wp.length} pts</span>`;
      s += `<button class="btn sm primary" data-done-path="${player}">Done</button>`;
    } else {
      s += `<span style="color:var(--muted);">${wp.length} pts</span>`;
      s += `<button class="btn sm" data-draw-path="${player}">${wp.length?'redraw':'draw'}</button>`;
    }
  }
  // Handoff
  if(a.kind === 'handoff'){
    s += `<select data-target="${player}" style="width:60px;">${['RB','Y','H','Z','X'].map(p=>`<option value="${p}" ${a.to===p?'selected':''}>${p}</option>`).join('')}</select>`;
  }
  // Dropback
  if(a.kind === 'dropback'){
    s += `<select data-target="${player}" style="width:80px;">${['3','5','7'].map(s2=>`<option value="${s2}" ${a.steps==+s2?'selected':''}>${s2}-step</option>`).join('')}</select>`;
  }
  return s;
}

// Mini SVG for an RB route card (uses RB_ROUTES). Bottom-center receiver dot.
function rbCardSVG(key){
  const vw = 160, vh = 130;
  const sx = vw / 2, sy = vh - 18;
  const losY = sy + 6;
  const fn = RB_ROUTES[key];
  // Clamp waypoints into the card viewBox so the arrow is always visible
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const wps = (fn ? fn(sx, sy) : []).map(p => [clamp(p[0], 8, vw-8), clamp(p[1], 8, vh-12)]);
  const d = roundedPathD([[sx, sy], ...wps], 8);
  const mid = 'rcap_' + key + '_' + Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 ${vw} ${vh}" style="width:100%;height:auto;">
    <defs><marker id="${mid}" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="var(--gold)"/></marker></defs>
    <line x1="0" y1="${losY}" x2="${vw}" y2="${losY}" stroke="var(--border)" stroke-width="1"/>
    <path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#${mid})"/>
    <circle cx="${sx}" cy="${sy}" r="6" fill="var(--field)" stroke="var(--gold)" stroke-width="1.8"/>
  </svg>`;
}

// Open the existing custom route builder, but on save assign the drawn route

function openInlineRouteDrawer(player){
  const d = editorState.draft;

  const p = skill[player];
  if(!p){ alert('Player not in current formation.'); return; }

  crbState.editing = null;
  crbState.draft = { id: 'inline_' + Date.now(), name: player + ' custom', waypoints: [] };
  crbState._inlineFor = player;
  renderCustomRouteBuilder();

function assignRouteFromTemplate(player, opts){
  const d = editorState.draft;
  d.assignments[player] = d.assignments[player] || { kind: 'route' };
  d.assignments[player].kind = 'route';
  if(opts.builtIn){
    d.assignments[player].tree = opts.key;
    delete d.assignments[player].waypoints;
  } else if(opts.template){
    d.assignments[player].tree = 'custom';
    // Translate the template waypoints (stored in the builder's 320x240 space,
    // receiver at CRB_ORIGIN) into the live field, anchored at the player's spot.
    const skill = getFormation(d.formation).pos();
    const p = skill[player];
    if(!p){ delete d.assignments[player].waypoints; return; }
    const FSCALE = 0.95;  // builder space -> field space
    const waypoints = opts.template.waypoints.map(wp => {
      const dx = wp[0] - CRB_ORIGIN.x;
      const dy = wp[1] - CRB_ORIGIN.y;
      return [Math.round(p.x + dx * FSCALE), Math.round(p.y + dy * FSCALE)];
    });
    d.assignments[player].waypoints = waypoints;
  }
  renderEditor();
}

function saveDraftPlay(){
  const d = editorState.draft;
  if(!d.name || !d.name.trim()){ alert('Name required'); return; }
  const existing = editorState.editingId && DATA.plays.find(p => p.id === editorState.editingId);
  if(existing && existing.locked){
    alert('This play is view-only (shared by another coach). Duplicate it to make an editable copy.');
    return;
  }
  d.edited = true;  // user-touched plays are never overwritten by seed sync
  if(editorState.editingId){
    const idx = DATA.plays.findIndex(p=>p.id === editorState.editingId);
    if(idx >= 0) DATA.plays[idx] = d; else DATA.plays.push(d);
  } else {
    while(DATA.plays.find(p=>p.id === d.id)) d.id += '_x';
    DATA.plays.push(d);
  }
  ensurePlayCodes();
  markDirty();
  saveData();
  viewerState.playId = d.id;
  viewerState.variantIdx = 0;
  editorState.draft = null;
  activateTab('viewer');
}

    if(confirm('Reset all plays to the '+SEED_PLAYS.length+' built-in seed plays?')){
      DATA.plays = SEED_PLAYS.map(p=>({...p})); saveData(); renderCurrentTab();
    }
  };
  document.getElementById('wipe').onclick = () => {
    if(confirm('Wipe ALL playbook data?')){
      localStorage.removeItem(STORAGE_KEY); location.reload();
    }
  };
  const newF = document.getElementById('new-formation');
  if(newF) newF.onclick = () => openFormationBuilder(null);
  root.querySelectorAll('[data-fed]').forEach(b => b.onclick = () => openFormationBuilder(b.dataset.fed));
  root.querySelectorAll('[data-fdel]').forEach(b => b.onclick = () => {
    const id = b.dataset.fdel;
    const f = DATA.formations.find(x => x.id === id);
    if(f && confirm('Delete formation "'+f.name+'"?')){
      DATA.formations = DATA.formations.filter(x => x.id !== id);
      saveData(); renderSettings();
    }
  });
}

// ============================================================
// FORMATION BUILDER
// ============================================================
const fbState = { editing:null, draft:null, placingPlayer:null };

function openFormationBuilder(id){
  if(id){
    const f = DATA.formations.find(x => x.id === id);
    if(!f) return;
    fbState.editing = id;
    fbState.draft = JSON.parse(JSON.stringify(f));
  } else {
    fbState.editing = null;
    fbState.draft = {
      id: 'f_' + Date.now(),
      name: 'New Formation',
      under: false,
      skills: {
        X:  { x:FL+8,         y:ONL,    online:true  },
        Z:  { x:FR-8,         y:ONL,    online:true  },
        H:  { x:OL.LT-splitO, y:OFL,    online:false },
        Y:  { x:OL.RT+splitO, y:OFL,    online:false },
        QB: { x:MID,          y:LOS+72 },
        RB: { x:MID,          y:LOS+92 },
      },
    };
  }
  fbState.placingPlayer = null;
  renderFormationBuilder();
}

function renderFormationBuilder(){
  const f = fbState.draft;
  const skill = f.skills;
  // Render a temporary field with the formation as a modal
  const onLineSkill = Object.keys(skill).filter(k => skill[k].online).length;
  const onLineTotal = 5 + onLineSkill;
  const ok = onLineTotal >= 7;

  // Build SVG with player draggables
  let inner = drawOL();
  for(const k in skill){
    const p = skill[k];
    if(p.online){
      inner += `<line x1="${p.x}" y1="${p.y-11}" x2="${p.x}" y2="${LOS}" stroke="var(--fline10)" stroke-width="2"/>`;
    }
    const col = posColor(k);
    inner += `<circle cx="${p.x}" cy="${p.y}" r="13" fill="${col}" stroke="var(--field)" stroke-width="2.2" class="fb-player" data-fb="${k}" style="cursor:grab;"/>`
      + `<text x="${p.x}" y="${p.y+4.5}" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="${k.length>=2?10.5:12.5}" fill="#fff" style="paint-order:stroke" stroke="rgba(0,0,0,.38)" stroke-width="1.8" pointer-events="none">${k}</text>`;
  }
  const svg = renderFrame(inner);

  const playerChoices = ['X','Z','H','Y','RB','QB'];

  // Modal overlay
  const old = document.getElementById('fb-modal');
  if(old) old.remove();
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.id = 'fb-modal';
  modal.innerHTML = `
    <div class="modal-inner" style="max-width:780px;width:96%;">
      <h3>${fbState.editing ? 'Edit' : 'New'} Formation</h3>
      <div class="row" style="margin-bottom:10px;">
        <input type="text" id="fb-name" value="${escapeHtml(f.name)}" placeholder="Formation name" style="flex:1;">
        <input type="text" id="fb-id" value="${escapeHtml(f.id)}" placeholder="id" style="width:140px;" ${fbState.editing?'disabled':''}>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="fb-under" ${f.under?'checked':''}>Under center</label>
      </div>
      <div style="font-family:'Roboto Mono';font-size:11px;color:${ok?'var(--motion)':'var(--accent)'};margin-bottom:6px;">
        On the line: ${onLineTotal} ${ok?'✓ legal':'⚠ need 7'}
      </div>
      <div style="position:relative;" id="fb-fieldwrap">${svg}</div>
      <div style="margin-top:10px;">
        <div class="lbl">Toggle on-line:</div>
        <div class="row">
          ${Object.keys(skill).filter(k=>k!=='QB'&&k!=='RB').map(k => `<button class="btn sm ${skill[k].online?'active':''}" data-fbonline="${k}">${k}: ${skill[k].online?'on line':'off line'}</button>`).join('')}
        </div>
      </div>
      <div style="margin-top:8px;font-family:'Roboto Mono';font-size:11px;color:var(--muted);">
        Drag a player on the field to reposition. Click "Toggle on-line" to flip their LOS status.
      </div>
      <div class="row" style="margin-top:14px;justify-content:flex-end;">
        <button class="btn" id="fb-cancel">Cancel</button>
        <button class="btn primary" id="fb-save">Save Formation</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // Drag handlers
  const fwrap = modal.querySelector('#fb-fieldwrap svg');
  let dragging = null;
  fwrap.querySelectorAll('.fb-player').forEach(el => {
    el.addEventListener('mousedown', e => {
      dragging = el.getAttribute('data-fb');
      e.preventDefault();
    });
    el.addEventListener('touchstart', e => {
      dragging = el.getAttribute('data-fb');
      e.preventDefault();
    }, {passive:false});
  });
  function moveTo(clientX, clientY){
    if(!dragging) return;
    const pt = fwrap.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const c = pt.matrixTransform(fwrap.getScreenCTM().inverse());
    fbState.draft.skills[dragging].x = Math.round(c.x);
    fbState.draft.skills[dragging].y = Math.round(c.y);
    renderFormationBuilder();
  }
  fwrap.addEventListener('mousemove', e => { if(dragging) moveTo(e.clientX, e.clientY); });
  fwrap.addEventListener('touchmove', e => { if(dragging && e.touches[0]){ moveTo(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, {passive:false});
  document.addEventListener('mouseup', () => { dragging = null; }, { once:true });
  document.addEventListener('touchend', () => { dragging = null; }, { once:true });

  // Toggle on-line
  modal.querySelectorAll('[data-fbonline]').forEach(b => b.onclick = () => {
    const k = b.dataset.fbonline;
    f.skills[k].online = !f.skills[k].online;
    renderFormationBuilder();
  });
  modal.querySelector('#fb-name').oninput = e => { f.name = e.target.value; };
  modal.querySelector('#fb-id').oninput = e => { if(!fbState.editing) f.id = e.target.value.trim().replace(/[^a-z0-9_]/gi,'_'); };
  modal.querySelector('#fb-under').onchange = e => { f.under = e.target.checked; };
  modal.querySelector('#fb-cancel').onclick = () => { modal.remove(); };
  modal.querySelector('#fb-save').onclick = () => {
    if(!f.name || !f.name.trim()){ alert('Name required'); return; }
    if(!f.id || !f.id.trim()){ alert('ID required'); return; }
    DATA.formations = DATA.formations || [];
    if(fbState.editing){
      const idx = DATA.formations.findIndex(x => x.id === fbState.editing);
      if(idx >= 0) DATA.formations[idx] = f;
    } else {
      while(DATA.formations.find(x => x.id === f.id) || FORMATIONS[f.id]) f.id += '_x';
      DATA.formations.push(f);
    }
    saveData();
    modal.remove();
    renderSettings();
  };
}

// ============================================================
// PRINTING
// ============================================================
function printWristband(plays){
  const area = document.getElementById('print-area');
  const chunks = [];
  for(let i=0;i<plays.length;i+=12) chunks.push(plays.slice(i,i+12));
  const oldFlip = FLIP; FLIP = false;
  area.innerHTML = chunks.map(chunk => `
    <div class="wristband-page">
      ${chunk.map(p => {
        const code = p.code || '';
        return `<div class="wristband-cell">
          <div class="code">${code}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          ${renderPlay(p, {defense:p.defenseDefault||'3-4'})}
        </div>`;
      }).join('')}
    </div>
  `).join('');
  FLIP = oldFlip;
  document.body.classList.add('printing');
  area.style.display = 'block';
  setTimeout(()=>{ window.print(); area.style.display='none'; area.innerHTML=''; document.body.classList.remove('printing'); }, 100);
}

function printPracticeCard(play){
  const area = document.getElementById('print-area');
  const oldFlip = FLIP; FLIP = false;
  area.innerHTML = `
    <div class="practice-card">
      <h2 style="font-size:20px;text-transform:uppercase;">${escapeHtml(play.name)} <small style="font-size:12px;color:#666;">${escapeHtml(play.tag||'')} · ${escapeHtml(getFormation(play.formation).name)}</small></h2>
      <p>${escapeHtml(play.desc||'')}</p>
      ${renderPlay(play, {defense:play.defenseDefault||'3-4'})}
      <table style="width:100%;margin-top:10px;font-size:12px;border-collapse:collapse;">
        ${(play.rows||[]).map(r=>`<tr><td style="font-weight:700;padding:3px 6px;border-bottom:1px solid #ddd;width:80px;">${escapeHtml(r[0])}</td><td style="padding:3px 6px;border-bottom:1px solid #ddd;">${escapeHtml(r[1])}</td></tr>`).join('')}
      </table>
      ${play.note?`<p style="margin-top:8px;font-style:italic;">${escapeHtml(play.note)}</p>`:''}
    </div>
  `;
  FLIP = oldFlip;
  area.style.display = 'block';
  setTimeout(()=>{ window.print(); area.style.display='none'; area.innerHTML=''; }, 100);
}

function printCallSheet(plays){
  const area = document.getElementById('print-area');
  const byTag = {};
  plays.forEach(p => { const t = p.tag||'OTHER'; (byTag[t]=byTag[t]||[]).push(p); });
  area.innerHTML = `
    <div class="callsheet">
      <h1 style="font-size:18px;text-transform:uppercase;">Call Sheet</h1>
      ${Object.keys(byTag).sort().map(tag => `
        <h2>${escapeHtml(tag)}</h2>
        <ul>${byTag[tag].map(p=>`<li><b>${escapeHtml(p.name)}</b> — ${escapeHtml(p.desc||'').slice(0,90)}</li>`).join('')}</ul>
      `).join('')}
    </div>
  `;
  area.style.display = 'block';
  setTimeout(()=>{ window.print(); area.style.display='none'; area.innerHTML=''; }, 100);
}

// ============================================================
// EDITOR POPOVER (player tap)
// ============================================================
function openPlayerPopover(player, event){
  closePopovers();
  const d = editorState.draft;
  const skill = FORMATIONS[d.formation].pos();
  const isOL = ['LT','LG','C','RG','RT'].includes(player);
  const isRec = ['X','Z','H'].includes(player) || (player === 'Y' && skill.Y && skill.Y.online !== undefined && !skill.Y.online);
  const kinds = isOL ? ALL_KINDS.OL
    : player === 'QB' ? ALL_KINDS.qb
    : (player === 'RB' || player === 'Y') ? [...ALL_KINDS.back, ...ALL_KINDS.rec]
    : ALL_KINDS.rec;

  const pop = document.createElement('div');
  pop.className = 'popover';
  pop.style.left = (event.pageX + 6) + 'px';
  pop.style.top = (event.pageY + 6) + 'px';
  pop.innerHTML = `<div class="pop-title">${player} · action</div>`
    + kinds.map(k => `<button data-kind="${k}">${k}</button>`).join('');
  document.body.appendChild(pop);
  pop.querySelectorAll('[data-kind]').forEach(b => b.onclick = () => {
    d.assignments[player] = { kind: b.dataset.kind };
    // RB uses the backfield route set — 'hitch' only exists in the receiver tree
    if(b.dataset.kind === 'route') d.assignments[player].tree = (player === 'RB') ? 'out' : 'hitch';
    if(['pull','trap','carry','motion','fake','lead','reverse'].includes(b.dataset.kind)){
      d.assignments[player].waypoints = [];
    }
    closePopovers();
    renderEditor();
    // If it's a target-based kind, prompt user to tap a defender
    if(['block','down','stalk','cutoff','crack'].includes(b.dataset.kind)){
      editorState.drawMode = 'target';
      editorState.drawingFor = { player };
      setTimeout(()=>alert('Tap a defender on the field to set the target.'), 50);
    }
  });
}
function closePopovers(){
  document.querySelectorAll('.popover').forEach(p => p.remove());
}
document.addEventListener('click', e => {
  if(!e.target.closest('.popover') && !e.target.closest('[data-player]')){
    closePopovers();
  }
});

// ============================================================
// TABS
// ============================================================
// Tab → { panel element id, render fn }. Aliases keep older call sites working.
const TAB_ALIAS = { library:'playbook', editor:'build', routes:'templates' };
const TAB_MAP = {
  playbook:  { panel:'library-tab',   render: renderLibrary },
  viewer:    { panel:'viewer-tab',    render: renderViewer },
  build:     { panel:'editor-tab',    render: renderEditor },
  templates: { panel:'templates-tab', render: renderTemplates },
  settings:  { panel:'settings-tab',  render: renderSettings },
};
let currentTab = 'playbook';

function activateTab(name){
  name = TAB_ALIAS[name] || name;
  const def = TAB_MAP[name];
  if(!def) return;
  currentTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar .tab').forEach(t => t.classList.remove('active'));
  document.getElementById(def.panel).classList.add('active');
  const btn = document.querySelector(`.tabbar .tab[data-tab="${name}"]`);
  if(btn) btn.classList.add('active');
  def.render();
  window.scrollTo(0, 0);
}

function renderCurrentTab(){
  (TAB_MAP[currentTab] || TAB_MAP.playbook).render();
}

document.querySelectorAll('.tabbar .tab').forEach(t => t.onclick = () => activateTab(t.dataset.tab));
document.getElementById('hdr-new-play').onclick = () => {
  editorState.editingId = null;
  editorState.draft = blankPlay();
  activateTab('build');
};

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// BOOT
// ============================================================
seedIfEmpty();
applyTheme();
// Offline support when hosted (https) — caches the app after the first visit
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// Shared-link import: #pb=<playbook code> or #p=<single play code>
(function(){
  const h = location.hash || '';
  if(h.startsWith('#pb=') || h.startsWith('#p=')){
    const code = decodeURIComponent(h.slice(h.indexOf('=') + 1));
    history.replaceState(null, '', location.pathname + location.search);
    if(confirm('This link contains a shared playbook/play. Import it into your playbook?')){
      importShareCode(code);
    }
  }
})();
activateTab('playbook');
